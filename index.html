<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Body Map — becs designed</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,300;0,400;1,300;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Fragment+Mono:ital@0;1&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; background: #f0efeb; }

    .photo {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      object-position: center center;
      display: block;
      z-index: 0;
    }

    .hotspot {
      position: fixed;
      width: 40px;
      height: 40px;
      transform: translate(-50%, -50%);
      cursor: crosshair;
      z-index: 20;
    }

    .floating-panel {
      position: fixed;
      left: 28px;
      top: 28px;
      z-index: 10;
    }
    .panel-title {
      font-family: 'Fragment Mono', monospace;
      font-size: 0.75rem;
      font-weight: 400;
      letter-spacing: 0.08em;
      line-height: 1.15;
      color: #1a1a1a;
      margin-bottom: 4px;
    }
    .panel-subtitle {
      font-family: 'Cormorant', serif;
      font-size: 0.8rem;
      font-weight: 300;
      font-style: italic;
      color: rgba(0,0,0,0.38);
      margin-bottom: 20px;
    }
    .panel-section {
      font-family: 'Fragment Mono', monospace;
      font-size: 0.42rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(0,0,0,0.3);
      margin-bottom: 8px;
    }
    .zone-list { list-style: none; }
    .zone-item {
      font-family: 'Fragment Mono', monospace;
      font-size: 0.5rem;
      letter-spacing: 0.06em;
      font-weight: 400;
      color: rgba(0,0,0,0.5);
      padding: 5px 0;
      border-bottom: 0.5px solid rgba(0,0,0,0.06);
      cursor: pointer;
      transition: color 0.15s, padding-left 0.15s;
    }
    .zone-item:first-child { border-top: 0.5px solid rgba(0,0,0,0.06); }
    .zone-item:hover { color: #000; padding-left: 4px; }
    .zone-item.active { color: #ff0000; }

    .floating-back {
      position: fixed;
      left: 28px;
      bottom: 24px;
      font-family: 'Fragment Mono', monospace;
      font-size: 0.42rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(0,0,0,0.28);
      text-decoration: none;
      z-index: 10;
      transition: color 0.2s;
    }
    .floating-back:hover { color: rgba(0,0,0,0.6); }
    .floating-br {
      position: fixed;
      right: 28px;
      bottom: 24px;
      font-family: 'Fragment Mono', monospace;
      font-size: 0.42rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(0,0,0,0.22);
      z-index: 10;
    }
    .floating-tr {
      position: fixed;
      right: 28px;
      top: 24px;
      font-family: 'Cormorant', serif;
      font-size: 0.85rem;
      font-weight: 300;
      font-style: italic;
      color: rgba(0,0,0,0.28);
      z-index: 10;
    }

    .card {
      position: fixed;
      width: 210px;
      background: #f5f2eb;
      border: 1px solid rgba(255,0,0,0.15);
      padding: 16px 18px 12px;
      z-index: 100;
      pointer-events: none;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.2s ease, transform 0.2s ease;
    }
    .card.visible {
      opacity: 1;
      transform: translateY(0);
      pointer-events: all;
    }
    .card-line {
      position: fixed;
      width: 0.5px;
      background: rgba(255,0,0,0.25);
      pointer-events: none;
      z-index: 99;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .card-line.visible { opacity: 1; }
    .card-label {
      font-family: 'Fragment Mono', monospace;
      font-size: 0.42rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #ff0000;
      opacity: 0.6;
      margin-bottom: 5px;
    }
    .card-title {
      font-family: 'Cormorant', serif;
      font-size: 1.25rem;
      font-weight: 300;
      font-style: italic;
      color: #0a0a0a;
      margin-bottom: 12px;
      line-height: 1.15;
    }
    .topic-list { list-style: none; }
    .topic-item a {
      display: flex;
      align-items: center;
      gap: 7px;
      font-family: 'Fragment Mono', monospace;
      font-size: 0.46rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: rgba(0,0,0,0.6);
      text-decoration: none;
      padding: 6px 0;
      border-top: 0.5px solid rgba(0,0,0,0.07);
      transition: color 0.15s, padding-left 0.15s;
    }
    .topic-item:last-child a { border-bottom: 0.5px solid rgba(0,0,0,0.07); }
    .topic-item a:hover { color: #ff0000; padding-left: 5px; }
    .topic-item a::before { content: '→'; opacity: 0.35; font-size: 0.5rem; }
  </style>
</head>
<body>

  <img class="photo" src="https://i.imgur.com/0VYkGrB.png" alt="body map"/>

  <div class="floating-panel">
    <div class="panel-title">Body Map.</div>
    <div class="panel-subtitle">a research index</div>
    <div class="panel-section">Zones</div>
    <ul class="zone-list" id="zone-list">
      <li class="zone-item" data-zone="scalp">Scalp &amp; Hair</li>
      <li class="zone-item" data-zone="face">Face &amp; Skin</li>
      <li class="zone-item" data-zone="neck">Neck &amp; Posture</li>
      <li class="zone-item" data-zone="torso">Gut &amp; Digestion</li>
      <li class="zone-item" data-zone="arms">Arms &amp; Hands</li>
      <li class="zone-item" data-zone="legs">Legs &amp; Feet</li>
    </ul>
  </div>

  <a class="floating-back" href="https://becsdesigned.com">← becs designed</a>
  <div class="floating-tr">click any point to explore</div>
  <div class="floating-br">broward, fl</div>

  <div class="hotspot" data-zone="scalp"></div>
  <div class="hotspot" data-zone="face"></div>
  <div class="hotspot" data-zone="neck"></div>
  <div class="hotspot" data-zone="torso"></div>
  <div class="hotspot" data-zone="arms"></div>
  <div class="hotspot" data-zone="legs"></div>

  <div class="card" id="card">
    <div class="card-label" id="card-label"></div>
    <div class="card-title" id="card-title"></div>
    <ul class="topic-list" id="card-topics"></ul>
  </div>
  <div class="card-line" id="card-line"></div>

<script>
const zones = {
  scalp: { label:'01 — scalp', title:'Scalp & Hair', topics:[
    {name:'Trichology research',href:'#scalp/trichology'},
    {name:'Scalp photos & progress',href:'#scalp/photos'},
    {name:'Curly hair method',href:'#scalp/curly-method'},
    {name:'Shampoo & co-wash',href:'#scalp/routine'},
    {name:'Porosity & moisture',href:'#scalp/moisture'},
    {name:'Products',href:'#scalp/products'}]},
  face: { label:'02 — face', title:'Face & Skin', topics:[
    {name:'AM routine',href:'#face/am'},
    {name:'PM routine',href:'#face/pm'},
    {name:'Active ingredients',href:'#face/actives'},
    {name:'SPF research',href:'#face/spf'},
    {name:'Hyperpigmentation',href:'#face/pigmentation'}]},
  neck: { label:'03 — neck', title:'Neck & Posture', topics:[
    {name:'Posture research',href:'#neck/posture'},
    {name:'Neck skincare',href:'#neck/skincare'},
    {name:'Stretching routine',href:'#neck/stretch'}]},
  torso: { label:'04 — gut', title:'Gut & Digestion', topics:[
    {name:'Microbiome research',href:'#gut/microbiome'},
    {name:'Food sensitivities',href:'#gut/sensitivities'},
    {name:'Supplement stack',href:'#gut/supplements'},
    {name:'Nutrition protocols',href:'#gut/nutrition'},
    {name:'Probiotics & enzymes',href:'#gut/probiotics'}]},
  arms: { label:'05 — arms', title:'Arms & Hands', topics:[
    {name:'Hand & nail care',href:'#arms/nails'},
    {name:'Strength training',href:'#arms/training'},
    {name:'Skin texture research',href:'#arms/skin'}]},
  legs: { label:'06 — legs', title:'Legs & Feet', topics:[
    {name:'Mobility & stretching',href:'#legs/mobility'},
    {name:'Foot care routine',href:'#legs/feet'},
    {name:'Workout & recovery',href:'#legs/workout'},
    {name:'Vascular health',href:'#legs/vascular'}]}
};

const hotspotPositions = {
  scalp: { x: 0.500, y: 0.10 },
  face:  { x: 0.508, y: 0.19 },
  neck:  { x: 0.503, y: 0.29 },
  torso: { x: 0.485, y: 0.48 },
  arms:  { x: 0.595, y: 0.38 },
  legs:  { x: 0.485, y: 0.78 },
};

const card     = document.getElementById('card');
const cardLine = document.getElementById('card-line');
let activeZone = null;

function repositionHotspots() {
  const W = window.innerWidth;
  const H = window.innerHeight;
  document.querySelectorAll('.hotspot').forEach(dot => {
    const p = hotspotPositions[dot.dataset.zone];
    if (!p) return;
    dot.style.left = (p.x * W) + 'px';
    dot.style.top  = (p.y * H) + 'px';
  });
}

window.addEventListener('resize', () => { repositionHotspots(); if (activeZone) closeCard(); });
repositionHotspots();

function openCard(zone, dot) {
  const z = zones[zone];
  document.getElementById('card-label').textContent = z.label;
  document.getElementById('card-title').textContent = z.title;
  document.getElementById('card-topics').innerHTML = z.topics
    .map(t => `<li class="topic-item"><a href="${t.href}">${t.name}</a></li>`).join('');

  const dotRect = dot.getBoundingClientRect();
  const dotCX = dotRect.left + dotRect.width / 2;
  const dotCY = dotRect.top  + dotRect.height / 2;

  card.style.visibility = 'hidden';
  card.style.display = 'block';
  const cardW = card.offsetWidth;
  const cardH = card.offsetHeight;
  card.style.visibility = '';
  card.style.display = '';

  const gap = 14;
  let cardLeft = dotCX - cardW / 2;
  let cardTop  = dotCY - cardH - gap;
  cardLeft = Math.max(8, Math.min(cardLeft, window.innerWidth - cardW - 8));
  if (cardTop < 8) cardTop = dotCY + 20 + gap;

  card.style.left = cardLeft + 'px';
  card.style.top  = cardTop  + 'px';

  const lineH = dotCY - (cardTop + cardH);
  cardLine.style.left   = dotCX + 'px';
  cardLine.style.top    = (cardTop + cardH) + 'px';
  cardLine.style.height = Math.max(0, lineH) + 'px';

  card.classList.add('visible');
  cardLine.classList.add('visible');
}

function closeCard() {
  card.classList.remove('visible');
  cardLine.classList.remove('visible');
  document.querySelectorAll('.hotspot').forEach(h => h.classList.remove('active'));
  document.querySelectorAll('.zone-item').forEach(l => l.classList.remove('active'));
  activeZone = null;
}

document.querySelectorAll('.hotspot').forEach(dot => {
  dot.addEventListener('click', e => {
    e.stopPropagation();
    const zone = dot.dataset.zone;
    if (activeZone === zone) { closeCard(); return; }
    activeZone = zone;
    document.querySelectorAll('.hotspot').forEach(h => h.classList.remove('active'));
    document.querySelectorAll('.zone-item').forEach(l => l.classList.remove('active'));
    dot.classList.add('active');
    document.querySelector(`.zone-item[data-zone="${zone}"]`)?.classList.add('active');
    openCard(zone, dot);
  });
});

document.querySelectorAll('.zone-item').forEach(item => {
  item.addEventListener('click', () => {
    const zone = item.dataset.zone;
    const dot  = document.querySelector(`.hotspot[data-zone="${zone}"]`);
    if (activeZone === zone) { closeCard(); return; }
    activeZone = zone;
    document.querySelectorAll('.hotspot').forEach(h => h.classList.remove('active'));
    document.querySelectorAll('.zone-item').forEach(l => l.classList.remove('active'));
    dot?.classList.add('active');
    item.classList.add('active');
    if (dot) openCard(zone, dot);
  });
});

document.addEventListener('click', e => {
  if (!e.target.closest('.hotspot') && !e.target.closest('.card') && !e.target.closest('.zone-item')) closeCard();
});
card.addEventListener('click', e => e.stopPropagation());
</script>
</body>
</html>
