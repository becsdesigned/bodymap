<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Body Map — becs designed</title>
  <link href="https://fonts.googleapis.com/css2?family=Fragment+Mono:ital@0;1&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --accent: #b8443c; --accent-rgb: 184,68,60; }
    html, body { height: 100%; overflow: hidden; background: #f0efeb; }

    .photo {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      object-position: center center;
      display: block;
      z-index: 0;
      transition: width 0.45s ease;
    }
    body.panel-open .photo { width: 50vw; }

    #overlay-svg {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      z-index: 10;
      overflow: visible;
    }

    .body-region {
      fill: var(--accent);
      fill-opacity: 0;
      cursor: pointer;
      transition: fill-opacity 0.2s;
    }
    .body-region:hover { fill-opacity: 0; }
    .body-region.active { fill-opacity: 0; }
    body.panel-open .body-region { pointer-events: none; }

    .connector-line { display: none; }

    .left-col {
      position: fixed;
      left: 0; top: 0; bottom: 0;
      width: 190px;
      z-index: 30;
      display: flex;
      flex-direction: column;
      padding: 28px 20px 24px;
    }
    .col-title {
      font-family: 'Fragment Mono', monospace;
      font-size: 1.25rem;
      font-weight: 400;
      letter-spacing: 0.04em;
      white-space: nowrap;
      color: #1a1a1a;
      margin-bottom: 3px;
    }
    .col-subtitle {
      font-family: 'Fragment Mono', monospace;
      font-size: 1.05rem;
      font-weight: 300;
      font-style: italic;
      color: rgba(0,0,0,0.35);
      margin-bottom: 28px;
    }
    .col-section {
      font-family: 'Fragment Mono', monospace;
      font-size: 0.56rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(0,0,0,0.28);
      margin-bottom: 8px;
    }
    .zone-list { list-style: none; }
    .zone-item {
      font-family: 'Fragment Mono', monospace;
      font-size: 0.70rem;
      letter-spacing: 0.05em;
      color: rgba(0,0,0,0.45);
      padding: 6px 0;
      border-bottom: 0.5px solid rgba(0,0,0,0.05);
      cursor: pointer;
      transition: color 0.15s;
      user-select: none;
    }
    .zone-item:first-child { border-top: 0.5px solid rgba(0,0,0,0.05); }
    .zone-item:hover { color: #000; }
    .zone-item.active { color: var(--accent); }
    .zone-expand {
      list-style: none;
      padding: 6px 0 12px 12px;
      margin: 2px 0 6px 1px;
      border-left: 2px solid var(--accent);
      animation: expandIn 0.18s ease;
    }
    @keyframes expandIn {
      from { opacity: 0; transform: translateY(-4px); }
      to   { opacity: 1; transform: none; }
    }
    .zone-expand-summary {
      font-family: 'Fragment Mono', monospace;
      font-size: 0.58rem;
      line-height: 1.65;
      color: rgba(0,0,0,0.42);
      margin-bottom: 10px;
    }
    .zone-expand-list { list-style: none; }
    .zone-expand-item {
      position: relative;
      font-family: 'Fragment Mono', monospace;
      font-size: 0.62rem;
      letter-spacing: 0.03em;
      color: rgba(0,0,0,0.55);
      padding: 6px 0 6px 14px;
      cursor: pointer;
      transition: color 0.15s, padding-left 0.15s;
    }
    .zone-expand-item::before {
      content: '+';
      position: absolute;
      left: 0;
      color: var(--accent);
      opacity: 0.5;
    }
    .zone-expand-item:hover { color: var(--accent); padding-left: 18px; }
    .col-back {
      font-family: 'Fragment Mono', monospace;
      font-size: 0.56rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(0,0,0,0.22);
      text-decoration: none;
      margin-top: auto;
      padding-top: 20px;
      transition: color 0.2s;
    }
    .col-back:hover { color: rgba(0,0,0,0.55); }

    .card {
      position: fixed;
      right: 0;
      top: 0;
      bottom: 0;
      width: 190px;
      z-index: 30;
      display: flex;
      flex-direction: column;
      padding: 28px 20px 24px;
      background: transparent;
      border: none;
      overflow-y: auto;
      transition: opacity 0.2s ease;
    }
    .card::-webkit-scrollbar { width: 0; }
    .card.visible {
      opacity: 1;
      pointer-events: all;
    }
    body.panel-open .card { opacity: 0; pointer-events: none; }
    .card-placeholder {
      font-family: 'Fragment Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.05em;
      color: rgba(0,0,0,0.32);
      line-height: 1.6;
    }
    .col-foot {
      font-family: 'Fragment Mono', monospace;
      font-size: 0.56rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(0,0,0,0.18);
      margin-top: auto;
      padding-top: 20px;
    }
    #card-eyebrow { display: none; }

    .card-label {
      display: none;
      font-family: 'Fragment Mono', monospace;
      font-size: 0.60rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent);
      opacity: 0.6;
      margin-bottom: 5px;
    }
    .card-title {
      font-family: 'Fragment Mono', monospace;
      font-size: 1.55rem;
      font-weight: 300;
      font-style: italic;
      color: #0a0a0a;
      margin-bottom: 4px;
      line-height: 1.15;
    }
    .card-summary {
      font-family: 'Fragment Mono', monospace;
      font-size: 0.95rem;
      line-height: 1.6;
      color: rgba(0,0,0,0.45);
      font-weight: 300;
      font-style: italic;
      margin-bottom: 12px;
    }
    .card-topic-list { list-style: none; }
    .card-topic-item {
      display: flex;
      align-items: center;
      gap: 7px;
      font-family: 'Fragment Mono', monospace;
      font-size: 0.64rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: rgba(0,0,0,0.6);
      padding: 6px 0;
      border-top: 0.5px solid rgba(0,0,0,0.07);
      cursor: pointer;
      transition: color 0.15s, padding-left 0.15s;
    }
    .card-topic-item:last-child { border-bottom: 0.5px solid rgba(0,0,0,0.07); }
    .card-topic-item::before { content: '+'; opacity: 0.4; font-size: 1.1rem; flex-shrink: 0; }
    .card-topic-item:hover { color: var(--accent); padding-left: 5px; }

    .info-panel {
      position: fixed;
      top: 0; right: 0;
      width: 50vw;
      height: 100vh;
      z-index: 40;
      transform: translateX(100%);
      transition: transform 0.4s ease;
      display: flex;
    }
    .info-panel.open { transform: translateX(0); }

    .panel-topics {
      width: 210px;
      flex-shrink: 0;
      padding: 32px 0 32px 28px;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }
    .panel-topics::-webkit-scrollbar { width: 0; }

    .panel-zone-label {
      display: none;
      font-family: 'Fragment Mono', monospace;
      font-size: 0.56rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent);
      opacity: 0.6;
      margin-bottom: 4px;
      display: block;
    }
    .panel-zone-title {
      font-family: 'Fragment Mono', monospace;
      font-size: 1.5rem;
      font-weight: 300;
      font-style: italic;
      color: #0a0a0a;
      margin-bottom: 16px;
      display: block;
      line-height: 1.2;
      border-bottom: 0.5px solid rgba(0,0,0,0.08);
      padding-bottom: 14px;
    }
    .panel-body-nav { list-style: none; margin-bottom: 14px; }
    .panel-body-nav-item {
      font-family: 'Fragment Mono', monospace;
      font-size: 0.4rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: rgba(0,0,0,0.28);
      padding: 3px 0;
      cursor: pointer;
      transition: color 0.15s;
    }
    .panel-body-nav-item:hover { color: #000; }
    .panel-body-nav-item.active { color: var(--accent); }
    .panel-nav-divider {
      border: none;
      border-top: 0.5px solid rgba(0,0,0,0.07);
      margin-bottom: 12px;
    }
    .panel-topic-list { list-style: none; flex: 1; }
    .panel-topic-item {
      font-family: 'Fragment Mono', monospace;
      font-size: 0.62rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: rgba(0,0,0,0.4);
      padding: 7px 0;
      cursor: pointer;
      border-bottom: 0.5px solid rgba(0,0,0,0.05);
      transition: color 0.15s, padding-left 0.15s;
    }
    .panel-topic-item:hover { color: #000; padding-left: 5px; }
    .panel-topic-item.active { color: var(--accent); padding-left: 5px; }
    .panel-x {
      position: absolute;
      top: 18px;
      right: 22px;
      bottom: auto;
      z-index: 50;
      width: 34px;
      height: 34px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f5f2eb;
      border: 0.5px solid rgba(var(--accent-rgb),0.3);
      color: var(--accent);
      font-family: 'Fragment Mono', monospace;
      font-size: 1.4rem;
      line-height: 1;
      cursor: pointer;
      padding: 0;
      transition: background 0.15s, border-color 0.15s, transform 0.15s;
    }
    .panel-x:hover { background: var(--accent); color: #f5f2eb; transform: rotate(90deg); }
    .panel-close-btn {
      display: block;
      margin-top: 24px;
      font-family: 'Fragment Mono', monospace;
      font-size: 0.56rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(0,0,0,0.22);
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      transition: color 0.2s;
      text-align: left;
    }
    .panel-close-btn:hover { color: #000; }

    .panel-content {
      flex: 1;
      overflow-y: auto;
      padding: 32px 28px 60px 20px;
    }
    .panel-content::-webkit-scrollbar { width: 0; }

    .content-title {
      font-family: 'Fragment Mono', monospace;
      font-size: 2.4rem;
      font-weight: 300;
      font-style: italic;
      color: #0a0a0a;
      line-height: 1.1;
      margin-bottom: 4px;
    }
    .content-label {
      font-family: 'Fragment Mono', monospace;
      font-size: 0.56rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(0,0,0,0.22);
      margin-bottom: 28px;
      display: block;
    }
    .content-section { margin-bottom: 26px; }
    .content-section-label {
      font-family: 'Fragment Mono', monospace;
      font-size: 0.56rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent);
      opacity: 0.5;
      display: block;
      margin-bottom: 8px;
    }
    .content-text {
      font-family: 'Fragment Mono', monospace;
      font-size: 1.5rem;
      line-height: 1.85;
      color: rgba(0,0,0,0.58);
      font-weight: 300;
    }
    .content-divider {
      border: none;
      border-top: 0.5px solid rgba(0,0,0,0.07);
      margin: 22px 0;
    }
    .content-links { list-style: none; }
    .content-links li { border-top: 0.5px solid rgba(0,0,0,0.06); }
    .content-links li:last-child { border-bottom: 0.5px solid rgba(0,0,0,0.06); }
    .content-links a {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 9px 0;
      font-family: 'Fragment Mono', monospace;
      font-size: 0.60rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: rgba(0,0,0,0.42);
      text-decoration: none;
      transition: color 0.15s, padding-left 0.15s;
    }
    .content-links a:hover { color: var(--accent); padding-left: 5px; }
    .content-links a::after { content: '+'; opacity: 0.4; }
    .content-placeholder {
      font-family: 'Fragment Mono', monospace;
      font-size: 1.15rem;
      line-height: 1.85;
      color: rgba(0,0,0,0.22);
      font-style: italic;
    }

    /* cortisol result table */
    .cortisol-table {
      width: 100%;
      border-collapse: collapse;
      font-family: 'Fragment Mono', monospace;
      font-size: 0.58rem;
      letter-spacing: 0.04em;
      margin-top: 8px;
    }
    .cortisol-table th {
      text-align: left;
      color: rgba(0,0,0,0.28);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      padding: 4px 0 6px;
      border-bottom: 0.5px solid rgba(0,0,0,0.08);
      font-weight: 400;
    }
    .cortisol-table td {
      padding: 7px 0;
      border-bottom: 0.5px solid rgba(0,0,0,0.05);
      color: rgba(0,0,0,0.55);
      vertical-align: top;
    }
    .cortisol-table td.time { color: rgba(0,0,0,0.35); }
    .cortisol-table td.value { font-weight: 400; }
    .cortisol-table td.value.low { color: var(--accent); }
    .cortisol-table td.value.normal { color: #2a6e3f; }
    .cortisol-table td.range { color: rgba(0,0,0,0.28); font-size: 0.52rem; }
    .result-badge {
      display: inline-block;
      font-family: 'Fragment Mono', monospace;
      font-size: 0.46rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 2px 5px;
      margin-left: 5px;
      vertical-align: middle;
    }
    .result-badge.low { background: rgba(var(--accent-rgb),0.07); color: var(--accent); }
    .result-badge.normal { background: rgba(42,110,63,0.08); color: #2a6e3f; }

    /* retest tracker */
    .retest-row {
      display: flex;
      gap: 16px;
      margin-top: 8px;
    }
    .retest-col {
      flex: 1;
      border: 0.5px solid rgba(0,0,0,0.08);
      padding: 10px 12px;
    }
    .retest-col-label {
      font-family: 'Fragment Mono', monospace;
      font-size: 0.48rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(0,0,0,0.25);
      display: block;
      margin-bottom: 6px;
    }
    .retest-col-date {
      font-family: 'Fragment Mono', monospace;
      font-size: 0.62rem;
      color: rgba(0,0,0,0.55);
      margin-bottom: 8px;
      display: block;
    }
    .retest-mini-val {
      font-family: 'Fragment Mono', monospace;
      font-size: 0.55rem;
      color: rgba(0,0,0,0.35);
      line-height: 2;
    }
    .retest-mini-val span.low { color: var(--accent); }
    .retest-mini-val span.normal { color: #2a6e3f; }
    .retest-pending {
      font-family: 'Fragment Mono', monospace;
      font-size: 1rem;
      color: rgba(0,0,0,0.2);
      font-style: italic;
      line-height: 1.6;
    }

    /* protocol stages */
    .protocol-stage {
      margin-bottom: 18px;
      border: 0.5px solid rgba(0,0,0,0.08);
      padding: 14px 16px;
    }
    .protocol-stage.transition {
      border-style: dashed;
      opacity: 0.6;
      padding: 10px 16px;
    }
    .protocol-stage-head {
      display: flex;
      align-items: baseline;
      gap: 10px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }
    .protocol-stage.transition .protocol-stage-head { margin-bottom: 0; }
    .protocol-stage-name {
      font-family: 'Fragment Mono', monospace;
      font-size: 1.4rem;
      font-weight: 300;
      font-style: italic;
      color: #0a0a0a;
    }
    .protocol-stage-state {
      font-family: 'Fragment Mono', monospace;
      font-size: 0.5rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 3px 7px;
    }
    .protocol-stage-state.tone-high { background: rgba(var(--accent-rgb),0.07); color: var(--accent); }
    .protocol-stage-state.tone-low  { background: rgba(42,110,63,0.08); color: #2a6e3f; }
    .protocol-stage-state.tone-mid  { background: rgba(0,0,0,0.05); color: rgba(0,0,0,0.4); }
    .protocol-items { display: flex; flex-direction: column; }
    .protocol-item {
      display: grid;
      grid-template-columns: 1fr 1.3fr;
      gap: 4px 12px;
      padding: 8px 0;
      border-top: 0.5px solid rgba(0,0,0,0.05);
      align-items: baseline;
    }
    .protocol-item-label {
      font-family: 'Fragment Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: rgba(0,0,0,0.6);
    }
    .protocol-item-dose {
      font-family: 'Fragment Mono', monospace;
      font-size: 1.05rem;
      color: rgba(0,0,0,0.5);
      line-height: 1.4;
    }
    .protocol-item-note {
      grid-column: 1 / -1;
      font-family: 'Fragment Mono', monospace;
      font-size: 0.46rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent);
      opacity: 0.55;
      margin-top: 2px;
    }

    /* foot restoration program */
    .frp-meta-row {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
    }
    .frp-meta-cell {
      flex: 1;
      border: 0.5px solid rgba(0,0,0,0.08);
      padding: 10px 12px;
      font-family: 'Fragment Mono', monospace;
      font-size: 1.05rem;
      color: rgba(0,0,0,0.55);
    }
    .frp-meta-k {
      display: block;
      font-family: 'Fragment Mono', monospace;
      font-size: 0.46rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(0,0,0,0.25);
      margin-bottom: 4px;
    }
    .frp-phase {
      margin-bottom: 16px;
      border: 0.5px solid rgba(0,0,0,0.08);
      padding: 14px 16px;
    }
    .frp-phase-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }
    .frp-phase-name {
      font-family: 'Fragment Mono', monospace;
      font-size: 1.4rem;
      font-weight: 300;
      font-style: italic;
      color: #0a0a0a;
    }
    .frp-phase-meta {
      font-family: 'Fragment Mono', monospace;
      font-size: 0.5rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(0,0,0,0.35);
    }
    .frp-weeks {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
      margin-bottom: 12px;
    }
    .frp-week {
      border: 0.5px solid rgba(0,0,0,0.06);
      padding: 7px 9px;
    }
    .frp-week-wk {
      display: block;
      font-family: 'Fragment Mono', monospace;
      font-size: 0.46rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent);
      opacity: 0.55;
      margin-bottom: 2px;
    }
    .frp-week-focus {
      font-family: 'Fragment Mono', monospace;
      font-size: 0.56rem;
      letter-spacing: 0.03em;
      color: rgba(0,0,0,0.55);
    }
    .frp-checkpoint {
      font-family: 'Fragment Mono', monospace;
      font-size: 0.95rem;
      font-style: italic;
      color: rgba(0,0,0,0.4);
      border-top: 0.5px solid rgba(0,0,0,0.06);
      padding-top: 10px;
    }
    .frp-includes { list-style: none; }
    .frp-inc-item {
      font-family: 'Fragment Mono', monospace;
      font-size: 1.1rem;
      line-height: 1.5;
      color: rgba(0,0,0,0.55);
      padding: 7px 0 7px 16px;
      border-bottom: 0.5px solid rgba(0,0,0,0.05);
      position: relative;
    }
    .frp-inc-item::before {
      content: '—';
      position: absolute;
      left: 0;
      color: var(--accent);
      opacity: 0.4;
    }

    /* notox method */
    .notox-mini-label {
      display: block;
      font-family: 'Fragment Mono', monospace;
      font-size: 0.46rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--accent);
      opacity: 0.5;
      margin-bottom: 4px;
    }
    .notox-elixir {
      border: 0.5px solid rgba(0,0,0,0.08);
      padding: 14px 16px;
    }
    .notox-ings {
      list-style: none;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4px 14px;
      margin-bottom: 14px;
    }
    .notox-ing {
      font-family: 'Fragment Mono', monospace;
      font-size: 1.05rem;
      color: rgba(0,0,0,0.55);
      padding-left: 12px;
      position: relative;
    }
    .notox-ing::before {
      content: '·';
      position: absolute;
      left: 0;
      color: var(--accent);
      opacity: 0.5;
    }
    .notox-steps {
      list-style: decimal;
      padding-left: 18px;
      margin-bottom: 14px;
    }
    .notox-step {
      font-family: 'Fragment Mono', monospace;
      font-size: 1.05rem;
      line-height: 1.5;
      color: rgba(0,0,0,0.55);
      padding: 2px 0;
    }
    .notox-elixir-notes {
      font-family: 'Fragment Mono', monospace;
      font-size: 0.95rem;
      line-height: 1.6;
      color: rgba(0,0,0,0.4);
      font-style: italic;
      border-top: 0.5px solid rgba(0,0,0,0.06);
      padding-top: 10px;
      margin-bottom: 12px;
    }
    .notox-elixir-ben {

function applyAccent(zone) {
  const a = zoneAccents[zone] || DEFAULT_ACCENT;
  document.documentElement.style.setProperty('--accent', a.hex);
  document.documentElement.style.setProperty('--accent-rgb', a.rgb);
}
function resetAccent() {
  document.documentElement.style.setProperty('--accent', DEFAULT_ACCENT.hex);
  document.documentElement.style.setProperty('--accent-rgb', DEFAULT_ACCENT.rgb);
}

function vbToScreen(vx, vy) {
  const W = window.innerWidth, H = window.innerHeight;
  const vbW = 1920, vbH = 1080;
  const scale  = Math.max(W / vbW, H / vbH);
  const offsetX = (W - vbW * scale) / 2;
  const offsetY = (H - vbH * scale) / 2;
  return { x: offsetX + vx * scale, y: offsetY + vy * scale };
}

function expandZone(zone) {
  const z = zones[zone];
  const old = document.querySelector('.zone-expand');
  if (old) old.remove();
  document.querySelectorAll('.zone-item').forEach(l => l.classList.remove('active'));
  document.querySelectorAll('.body-region').forEach(r => r.classList.remove('active'));
  activeZone = zone;
  applyAccent(zone);
  const zoneItem = document.querySelector(`.zone-item[data-zone="${zone}"]`);
  zoneItem?.classList.add('active');
  document.querySelector(`.body-region[data-zone="${zone}"]`)?.classList.add('active');
  if (!zoneItem) return;

  const li = document.createElement('li');
  li.className = 'zone-expand';
  const summaryHTML = z.summary ? `<div class="zone-expand-summary">${z.summary}</div>` : '';
  const itemsHTML = z.topics.map(t =>
    `<li class="zone-expand-item" data-zone="${zone}" data-slug="${t.slug}">${t.name}</li>`).join('');
  li.innerHTML = summaryHTML + `<ul class="zone-expand-list">${itemsHTML}</ul>`;
  zoneItem.insertAdjacentElement('afterend', li);
  li.querySelectorAll('.zone-expand-item').forEach(item =>
    item.addEventListener('click', e => { e.stopPropagation(); openPanel(item.dataset.zone, item.dataset.slug); }));
}

function collapseZone() {
  const old = document.querySelector('.zone-expand');
  if (old) old.remove();
  document.querySelectorAll('.zone-item').forEach(l => l.classList.remove('active'));
  document.querySelectorAll('.body-region').forEach(r => r.classList.remove('active'));
  activeZone = null;
  if (!document.body.classList.contains('panel-open')) resetAccent();
}

function closePanel() {
  infoPanel.classList.remove('open');
  document.body.classList.remove('panel-open');
}

function loadTopic(zone, slug) {
  const z     = zones[zone];
  const topic = z.topics.find(t => t.slug === slug);
  if (!topic) return;
  panelTopicList.querySelectorAll('.panel-topic-item').forEach(item =>
    item.classList.toggle('active', item.dataset.slug === slug));

  if (topic.type === 'cortisol') {
    panelContent.innerHTML = renderCortisolTopic(topic, z);
  } else if (topic.type === 'htma') {
    panelContent.innerHTML = renderHtmaTopic(topic, z);
  } else if (topic.type === 'omega3') {
    panelContent.innerHTML = renderOmega3Topic(topic, z);
  } else if (topic.type === 'protocol') {
    panelContent.innerHTML = renderProtocolTopic(topic, z);
  } else if (topic.type === 'frp') {
    panelContent.innerHTML = renderFrpTopic(topic, z);
  } else if (topic.type === 'notox') {
    panelContent.innerHTML = renderNotoxTopic(topic, z);
  } else if (topic.type === 'retest') {
    panelContent.innerHTML = renderRetestTopic(topic, z);
  } else {
    const notesFormatted = topic.notes.replace(/\n/g, '<br/>');
    const linksHTML = topic.links.length > 0
      ? `<hr class="content-divider"/>
         <div class="content-section">
           <span class="content-section-label">Links &amp; resources</span>
           <ul class="content-links">${topic.links.map(l =>
             `<li><a href="${l.href}" target="_blank" rel="noopener">${l.text}</a></li>`).join('')}
           </ul>
         </div>` : '';
    panelContent.innerHTML = `
      <div class="content-title">${topic.name}</div>
      <div class="content-section">
        <span class="content-section-label">Notes</span>
        <p class="content-text">${notesFormatted}</p>
      </div>
      ${linksHTML}
      ${pdfDownloadHTML(topic)}
      <hr class="content-divider"/>
      <div class="content-section">
        <span class="content-section-label">Your content</span>
        <p class="content-placeholder">Photos, videos, product lists, journal entries, and links will live here as you build out this section.</p>
      </div>`;
  }
  panelContent.scrollTop = 0;
}

function openPanel(zone, slug) {
  activeZone = zone;
  applyAccent(zone);
  const z = zones[zone];
  panelZoneLabel.textContent = z.label;
  panelZoneTitle.textContent = z.title;
  buildTopicList(zone, slug || z.topics[0].slug);
  loadTopic(zone, slug || z.topics[0].slug);
  infoPanel.classList.add('open');
  document.body.classList.add('panel-open');
}


function buildTopicList(zone, activeSlug) {
  panelTopicList.innerHTML = zones[zone].topics.map(t =>
    `<li class="panel-topic-item${t.slug === activeSlug ? ' active' : ''}" data-zone="${zone}" data-slug="${t.slug}">${t.name}</li>`
  ).join('');
  panelTopicList.querySelectorAll('.panel-topic-item').forEach(item =>
    item.addEventListener('click', () => loadTopic(item.dataset.zone, item.dataset.slug)));
}

function clearAll() {
  closePanel();
  collapseZone();
  resetAccent();
}

function selectZone(zone) {
  if (activeZone === zone) { collapseZone(); return; }
  expandZone(zone);
  if (document.body.classList.contains('panel-open')) {
    openPanel(zone, zones[zone].topics[0].slug);
  }
}

document.querySelectorAll('.body-region').forEach(region => {
  region.addEventListener('click', e => { e.stopPropagation(); selectZone(region.dataset.zone); });
});
document.querySelectorAll('.zone-item').forEach(item => {
  item.addEventListener('click', e => { e.stopPropagation(); selectZone(item.dataset.zone); });
});

document.getElementById('panel-x').addEventListener('click', closePanel);
document.addEventListener('click', e => {
  if (!e.target.closest('.left-col') &&

function runSearch() {
  const query = symptomInput.value.trim().toLowerCase();
  if (!query) { symptomResults.innerHTML = ''; return; }
  const matched = new Map();
  Object.entries(symptomMap).forEach(([keyword, results]) => {
    if (query.includes(keyword) || keyword.includes(query) ||
        keyword.split(' ').some(w => query.includes(w) && w.length > 3)) {
      results.forEach(([path, reason]) => {
        if (!matched.has(path)) {
          const [zoneKey, slug] = path.split('/');
          const zone  = zones[zoneKey];
          const topic = zone?.topics.find(t => t.slug === slug);
          if (zone && topic) matched.set(path, { zoneKey, zone, topic, reason });
        }
      });
    }
  });
  if (!matched.size) {
    symptomResults.innerHTML = '<div class="col-no-results">no results — try different terms</div>';
    return;
  }
  symptomResults.innerHTML = '';
  matched.forEach(({ zoneKey, zone, topic, reason }) => {
    const el = document.createElement('div');
    el.className = 'col-result-item';
    el.innerHTML = '<span class="col-result-zone">' + zone.title + '</span>' + topic.name;
    el.title = reason;
    el.addEventListener('click', () => {
      clearAll();
      symptomInput.value = '';
      symptomResults.innerHTML = '';
      setTimeout(() => {
        selectZone(zoneKey);
        setTimeout(() => openPanel(zoneKey, topic.slug), 300);
      }, 100);
    });
    symptomResults.appendChild(el);
  });
}
</script>
</body>
</html>
