<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Body Map — becs designed</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,300;0,400;1,300;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Fragment+Mono:ital@0;1&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; background: #f0efeb; }

    /* ── photo shifts left when panel opens ── */
    .photo {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      object-position: center center;
      display: block;
      z-index: 0;
      transition: width 0.4s ease;
    }
    body.panel-open .photo {
      width: 52vw;
    }

    /* ── hotspots ── */
    .hotspot {
      position: fixed;
      width: 40px;
      height: 40px;
      transform: translate(-50%, -50%);
      cursor: crosshair;
      z-index: 20;
    }

    /* ── floating left nav ── */
    .floating-panel {
      position: fixed;
      left: 28px;
      top: 28px;
      z-index: 30;
    }
    .panel-title {
      font-family: 'Fragment Mono', monospace;
      font-size: 0.75rem;
      font-weight: 400;
      letter-spacing: 0.08em;
      line-height: 1.15;
      color: #1a1a1a;
      margin-bottom: 4px;
    }
    .panel-subtitle {
      font-family: 'Cormorant', serif;
      font-size: 0.8rem;
      font-weight: 300;
      font-style: italic;
      color: rgba(0,0,0,0.38);
      margin-bottom: 20px;
    }
    .panel-section {
      font-family: 'Fragment Mono', monospace;
      font-size: 0.42rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(0,0,0,0.3);
      margin-bottom: 8px;
    }
    .zone-list { list-style: none; }
    .zone-item {
      font-family: 'Fragment Mono', monospace;
      font-size: 0.5rem;
      letter-spacing: 0.06em;
      color: rgba(0,0,0,0.5);
      padding: 5px 0;
      border-bottom: 0.5px solid rgba(0,0,0,0.06);
      cursor: pointer;
      transition: color 0.15s, padding-left 0.15s;
    }
    .zone-item:first-child { border-top: 0.5px solid rgba(0,0,0,0.06); }
    .zone-item:hover { color: #000; padding-left: 4px; }
    .zone-item.active { color: #ff0000; }

    .floating-back {
      position: fixed;
      left: 28px;
      bottom: 24px;
      font-family: 'Fragment Mono', monospace;
      font-size: 0.42rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(0,0,0,0.28);
      text-decoration: none;
      z-index: 30;
      transition: color 0.2s;
    }
    .floating-back:hover { color: rgba(0,0,0,0.6); }
    .floating-br {
      position: fixed;
      right: 28px;
      bottom: 24px;
      font-family: 'Fragment Mono', monospace;
      font-size: 0.42rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(0,0,0,0.22);
      z-index: 30;
    }
    .floating-tr {
      position: fixed;
      right: 28px;
      top: 24px;
      font-family: 'Cormorant', serif;
      font-size: 0.85rem;
      font-weight: 300;
      font-style: italic;
      color: rgba(0,0,0,0.28);
      z-index: 30;
      transition: opacity 0.3s;
    }
    body.panel-open .floating-tr { opacity: 0; pointer-events: none; }

    /* ── sliding panel ── */
    .info-panel {
      position: fixed;
      top: 0;
      right: 0;
      width: 48vw;
      height: 100vh;
      background: #f5f2eb;
      border-left: 0.5px solid rgba(0,0,0,0.1);
      z-index: 40;
      transform: translateX(100%);
      transition: transform 0.4s ease;
      display: flex;
    }
    .info-panel.open { transform: translateX(0); }

    /* left column: topic list */
    .panel-topics {
      width: 200px;
      flex-shrink: 0;
      border-right: 0.5px solid rgba(0,0,0,0.08);
      padding: 28px 0;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }
    .panel-topics::-webkit-scrollbar { width: 0; }

    .panel-zone-label {
      font-family: 'Fragment Mono', monospace;
      font-size: 0.42rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #ff0000;
      opacity: 0.6;
      padding: 0 20px 16px;
      display: block;
    }

    .panel-zone-title {
      font-family: 'Cormorant', serif;
      font-size: 1.3rem;
      font-weight: 300;
      font-style: italic;
      color: #0a0a0a;
      padding: 0 20px 20px;
      border-bottom: 0.5px solid rgba(0,0,0,0.08);
      display: block;
      line-height: 1.2;
    }

    .panel-topic-list {
      list-style: none;
      padding-top: 8px;
      flex: 1;
    }

    .panel-topic-item {
      font-family: 'Fragment Mono', monospace;
      font-size: 0.46rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: rgba(0,0,0,0.45);
      padding: 9px 20px;
      cursor: pointer;
      border-bottom: 0.5px solid rgba(0,0,0,0.05);
      transition: color 0.15s, padding-left 0.15s;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .panel-topic-item::before { content: '—'; opacity: 0.2; font-size: 0.4rem; flex-shrink: 0; }
    .panel-topic-item:hover { color: #000; padding-left: 26px; }
    .panel-topic-item.active {
      color: #ff0000;
      padding-left: 26px;
    }
    .panel-topic-item.active::before { opacity: 1; }

    .panel-close-btn {
      display: block;
      margin: auto 20px 0;
      padding-top: 24px;
      font-family: 'Fragment Mono', monospace;
      font-size: 0.42rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(0,0,0,0.28);
      background: none;
      border: none;
      cursor: pointer;
      text-align: left;
      transition: color 0.2s;
    }
    .panel-close-btn:hover { color: #000; }

    /* right column: topic content */
    .panel-content {
      flex: 1;
      overflow-y: auto;
      padding: 40px 36px 60px;
    }
    .panel-content::-webkit-scrollbar { width: 0; }

    .content-title {
      font-family: 'Cormorant', serif;
      font-size: 2rem;
      font-weight: 300;
      font-style: italic;
      color: #0a0a0a;
      line-height: 1.1;
      margin-bottom: 6px;
    }
    .content-label {
      font-family: 'Fragment Mono', monospace;
      font-size: 0.42rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(0,0,0,0.28);
      margin-bottom: 36px;
      display: block;
    }
    .content-section { margin-bottom: 32px; }
    .content-section-label {
      font-family: 'Fragment Mono', monospace;
      font-size: 0.42rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #ff0000;
      opacity: 0.55;
      display: block;
      margin-bottom: 10px;
    }
    .content-text {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1rem;
      line-height: 1.85;
      color: rgba(0,0,0,0.62);
      font-weight: 300;
    }
    .content-divider {
      border: none;
      border-top: 0.5px solid rgba(0,0,0,0.08);
      margin: 28px 0;
    }
    .content-links { list-style: none; }
    .content-links li {
      border-top: 0.5px solid rgba(0,0,0,0.07);
    }
    .content-links li:last-child { border-bottom: 0.5px solid rgba(0,0,0,0.07); }
    .content-links a {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      font-family: 'Fragment Mono', monospace;
      font-size: 0.46rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: rgba(0,0,0,0.5);
      text-decoration: none;
      transition: color 0.15s, padding-left 0.15s;
    }
    .content-links a:hover { color: #ff0000; padding-left: 6px; }
    .content-links a::after { content: '↗'; opacity: 0.4; }
    .content-placeholder {
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.95rem;
      line-height: 1.85;
      color: rgba(0,0,0,0.28);
      font-style: italic;
    }
  </style>
</head>
<body>

  <img class="photo" src="https://i.imgur.com/0VYkGrB.png" alt="body map"/>

  <div class="floating-panel">
    <div class="panel-title">Body Map.</div>
    <div class="panel-subtitle">a research index</div>
    <div class="panel-section">Zones</div>
    <ul class="zone-list" id="zone-list">
      <li class="zone-item" data-zone="scalp">Scalp &amp; Hair</li>
      <li class="zone-item" data-zone="face">Face &amp; Skin</li>
      <li class="zone-item" data-zone="neck">Neck &amp; Posture</li>
      <li class="zone-item" data-zone="torso">Gut &amp; Digestion</li>
      <li class="zone-item" data-zone="arms">Arms &amp; Hands</li>
      <li class="zone-item" data-zone="legs">Legs &amp; Feet</li>
    </ul>
  </div>

  <a class="floating-back" href="https://becsdesigned.com">← becs designed</a>
  <div class="floating-tr">click any point to explore</div>
  <div class="floating-br">broward, fl</div>

  <div class="hotspot" data-zone="scalp"></div>
  <div class="hotspot" data-zone="face"></div>
  <div class="hotspot" data-zone="neck"></div>
  <div class="hotspot" data-zone="torso"></div>
  <div class="hotspot" data-zone="arms"></div>
  <div class="hotspot" data-zone="legs"></div>

  <!-- sliding panel -->
  <div class="info-panel" id="info-panel">
    <!-- left: topic list -->
    <div class="panel-topics">
      <span class="panel-zone-label" id="panel-zone-label"></span>
      <span class="panel-zone-title" id="panel-zone-title"></span>
      <ul class="panel-topic-list" id="panel-topic-list"></ul>
      <button class="panel-close-btn" id="panel-close-btn">← close</button>
    </div>
    <!-- right: content -->
    <div class="panel-content" id="panel-content"></div>
  </div>

<script>
const zones = {
  scalp: { label:'01 — scalp', title:'Scalp & Hair', topics:[
    { name:'Trichology research', slug:'trichology',
      notes:'Your trichology research notes go here. Add what you\'ve learned about scalp health, hair loss, hair growth cycles, and what you\'ve discussed with specialists.',
      links:[{text:'Trichological Society',href:'https://www.trichological.com'},{text:'Scalp health journal',href:'#'},{text:'Specialist notes',href:'#'}]},
    { name:'Scalp photos & progress', slug:'photos',
      notes:'Document your scalp health over time. Add before/after photos, progress notes, and observations about changes in density, texture, and scalp condition.',
      links:[]},
    { name:'Curly hair method', slug:'curly-method',
      notes:'Your curly hair method notes — what works, what doesn\'t, your curl pattern, porosity results, and the techniques that suit your hair best.',
      links:[{text:'Curly Girl Method overview',href:'https://www.naturallycurly.com'},{text:'My curl profile',href:'#'}]},
    { name:'Shampoo & co-wash', slug:'routine',
      notes:'Wash day routine, frequency, products used, and observations. Include your shampoo, conditioner, co-wash, and how your scalp responds.',
      links:[{text:'Current shampoo',href:'#'},{text:'Co-wash notes',href:'#'}]},
    { name:'Porosity & moisture', slug:'moisture',
      notes:'Porosity test results, moisture-protein balance findings, and what your hair responds to. High, low, or medium porosity changes everything about how you care for it.',
      links:[]},
    { name:'Products', slug:'products',
      notes:'A running list of products you\'ve tried, what you\'re currently using, and what to avoid. Rate them, note ingredients to watch for.',
      links:[{text:'Current routine products',href:'#'},{text:'Ingredient checker',href:'https://www.cosdna.com'}]},
  ]},
  face: { label:'02 — face', title:'Face & Skin', topics:[
    { name:'AM routine', slug:'am',
      notes:'Your morning skincare routine — every step, product, and why it\'s there. Note actives, SPF, and anything you apply before makeup.',
      links:[]},
    { name:'PM routine', slug:'pm',
      notes:'Evening routine — cleansing, treatments, actives, and overnight products. Note the order of application and how your skin feels each morning.',
      links:[]},
    { name:'Active ingredients', slug:'actives',
      notes:'Deep dive into the actives you use or are researching — retinoids, acids, vitamin C, niacinamide. What they do, how to layer them, and what to avoid combining.',
      links:[{text:'INCIDecoder',href:'https://incidecoder.com'},{text:'Paula\'s Choice ingredient dictionary',href:'https://www.paulaschoice.com/ingredient-dictionary'}]},
    { name:'SPF research', slug:'spf',
      notes:'SPF research, what you\'ve tested, and what works for your skin tone. Notes on UVA/UVB protection, reapplication habits, and formulas that don\'t pill.',
      links:[]},
    { name:'Hyperpigmentation', slug:'pigmentation',
      notes:'Research and personal notes on treating hyperpigmentation — what\'s worked, what hasn\'t, timelines, and ingredients specifically helpful for melanin-rich skin.',
      links:[{text:'Hyperpigmentation research',href:'#'}]},
  ]},
  neck: { label:'03 — neck', title:'Neck & Posture', topics:[
    { name:'Posture research', slug:'posture',
      notes:'Posture research, assessments, and personal notes. What you\'ve noticed, exercises you\'ve tried, and how posture affects other areas of your health.',
      links:[]},
    { name:'Neck skincare', slug:'skincare',
      notes:'The neck is often neglected. Notes on extending your skincare routine downward, specific products, and any concerns like tech neck or texture.',
      links:[]},
    { name:'Stretching routine', slug:'stretch',
      notes:'Neck and upper back stretching routine — what you do, how often, and how it affects tension, headaches, and general comfort.',
      links:[]},
  ]},
  torso: { label:'04 — gut', title:'Gut & Digestion', topics:[
    { name:'Microbiome research', slug:'microbiome',
      notes:'Research on gut microbiome health — diversity, prebiotics vs probiotics, and what you\'ve learned about how your gut affects skin, mood, and immunity.',
      links:[{text:'Zoe Science & Nutrition',href:'https://joinzoe.com'}]},
    { name:'Food sensitivities', slug:'sensitivities',
      notes:'Personal food sensitivity notes — what you\'ve tested, eliminated, reintroduced, and how your body responded. Include any formal testing results.',
      links:[]},
    { name:'Supplement stack', slug:'supplements',
      notes:'Current supplements, why you take them, dosages, and observations. Note any changes when you start or stop something.',
      links:[]},
    { name:'Nutrition protocols', slug:'nutrition',
      notes:'Eating protocols you\'ve researched or tried — anti-inflammatory, Mediterranean, intuitive eating, or other approaches. What resonates and why.',
      links:[]},
    { name:'Probiotics & enzymes', slug:'probiotics',
      notes:'Probiotic strains researched, digestive enzymes tried, and your observations on how they affect digestion, bloating, and overall gut comfort.',
      links:[]},
  ]},
  arms: { label:'05 — arms', title:'Arms & Hands', topics:[
    { name:'Hand & nail care', slug:'nails',
      notes:'Nail health research, cuticle care, products used, and any issues like peeling, breakage, or slow growth. What\'s helped.',
      links:[]},
    { name:'Strength training', slug:'training',
      notes:'Upper body and arm training notes — exercises, progression, and how your arms feel and look with different training approaches.',
      links:[]},
    { name:'Skin texture research', slug:'skin',
      notes:'Notes on keratosis pilaris, dry skin, body acne, or other texture concerns on arms. What treatments you\'ve researched and tried.',
      links:[]},
  ]},
  legs: { label:'06 — legs', title:'Legs & Feet', topics:[
    { name:'Mobility & stretching', slug:'mobility',
      notes:'Lower body mobility research — hip flexors, hamstrings, glutes. Stretches and routines that\'ve helped with tightness, pain, or range of motion.',
      links:[]},
    { name:'Foot care routine', slug:'feet',
      notes:'Foot care — exfoliation, moisturising, nail care, and any issues like calluses, dryness, or ingrown nails. Products and routines that work.',
      links:[]},
    { name:'Workout & recovery', slug:'workout',
      notes:'Leg day workouts, recovery protocols, and notes on soreness, progression, and what your lower body responds to best.',
      links:[]},
    { name:'Vascular health', slug:'vascular',
      notes:'Research on vascular health — circulation, spider veins, varicose veins, and how movement, compression, and nutrition affect your legs.',
      links:[]},
  ]},
};

const hotspotPositions = {
  scalp: { x: 0.500, y: 0.10 },
  face:  { x: 0.508, y: 0.19 },
  neck:  { x: 0.503, y: 0.29 },
  torso: { x: 0.485, y: 0.48 },
  arms:  { x: 0.595, y: 0.38 },
  legs:  { x: 0.485, y: 0.78 },
};

const infoPanel     = document.getElementById('info-panel');
const panelZoneLabel = document.getElementById('panel-zone-label');
const panelZoneTitle = document.getElementById('panel-zone-title');
const panelTopicList = document.getElementById('panel-topic-list');
const panelContent   = document.getElementById('panel-content');
let activeZone = null;
let activeTopic = null;

function repositionHotspots() {
  const W = window.innerWidth;
  const H = window.innerHeight;
  document.querySelectorAll('.hotspot').forEach(dot => {
    const p = hotspotPositions[dot.dataset.zone];
    if (!p) return;
    dot.style.left = (p.x * W) + 'px';
    dot.style.top  = (p.y * H) + 'px';
  });
}
window.addEventListener('resize', repositionHotspots);
repositionHotspots();

function openZone(zone) {
  const z = zones[zone];
  activeZone = zone;
  activeTopic = z.topics[0].slug;

  // update left sidebar zone list
  document.querySelectorAll('.zone-item').forEach(l => l.classList.remove('active'));
  document.querySelector(`.zone-item[data-zone="${zone}"]`)?.classList.add('active');
  document.querySelectorAll('.hotspot').forEach(h => h.classList.remove('active'));
  document.querySelector(`.hotspot[data-zone="${zone}"]`)?.classList.add('active');

  // populate panel topic list
  panelZoneLabel.textContent = z.label;
  panelZoneTitle.textContent = z.title;
  panelTopicList.innerHTML = z.topics.map(t =>
    `<li class="panel-topic-item${t.slug === activeTopic ? ' active' : ''}" data-slug="${t.slug}">${t.name}</li>`
  ).join('');

  // attach topic click handlers
  panelTopicList.querySelectorAll('.panel-topic-item').forEach(item => {
    item.addEventListener('click', () => loadTopic(zone, item.dataset.slug));
  });

  // open panel & shift photo
  infoPanel.classList.add('open');
  document.body.classList.add('panel-open');

  // load first topic
  loadTopic(zone, activeTopic, false);
}

function loadTopic(zone, slug, scrollTop = true) {
  const z = zones[zone];
  const topic = z.topics.find(t => t.slug === slug);
  if (!topic) return;
  activeTopic = slug;

  // highlight active topic
  panelTopicList.querySelectorAll('.panel-topic-item').forEach(item => {
    item.classList.toggle('active', item.dataset.slug === slug);
  });

  const linksHTML = topic.links.length > 0
    ? `<ul class="content-links">${topic.links.map(l =>
        `<li><a href="${l.href}" target="_blank" rel="noopener">${l.text}</a></li>`
      ).join('')}</ul>`
    : '';

  panelContent.innerHTML = `
    <div class="content-title">${topic.name}</div>
    <span class="content-label">${z.label}</span>

    <div class="content-section">
      <span class="content-section-label">Notes</span>
      <p class="content-text">${topic.notes}</p>
    </div>

    ${topic.links.length > 0 ? `
      <hr class="content-divider"/>
      <div class="content-section">
        <span class="content-section-label">Links &amp; resources</span>
        ${linksHTML}
      </div>` : ''}

    <hr class="content-divider"/>
    <div class="content-section">
      <span class="content-section-label">Your content</span>
      <p class="content-placeholder">Photos, videos, product lists, journal entries, and links will live here as you build out this section.</p>
    </div>
  `;

  if (scrollTop) panelContent.scrollTop = 0;
}

function closePanel() {
  infoPanel.classList.remove('open');
  document.body.classList.remove('panel-open');
  document.querySelectorAll('.zone-item').forEach(l => l.classList.remove('active'));
  document.querySelectorAll('.hotspot').forEach(h => h.classList.remove('active'));
  activeZone = null;
  activeTopic = null;
}

document.getElementById('panel-close-btn').addEventListener('click', closePanel);

document.querySelectorAll('.hotspot').forEach(dot => {
  dot.addEventListener('click', e => {
    e.stopPropagation();
    const zone = dot.dataset.zone;
    if (activeZone === zone) { closePanel(); return; }
    openZone(zone);
  });
});

document.querySelectorAll('.zone-item').forEach(item => {
  item.addEventListener('click', () => {
    const zone = item.dataset.zone;
    if (activeZone === zone) { closePanel(); return; }
    openZone(zone);
  });
});

document.addEventListener('click', e => {
  if (!e.target.closest('.hotspot') && !e.target.closest('.info-panel') && !e.target.closest('.zone-item') && !e.target.closest('.floating-panel')) {
    closePanel();
  }
});
</script>
</body>
</html>
