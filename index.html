<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Body Map — becs designed</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,300;0,400;1,300;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Fragment+Mono:ital@0;1&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; background: #f0efeb; }

    .photo {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      object-position: center center;
      display: block;
      z-index: 0;
      transition: width 0.45s ease;
    }
    body.panel-open .photo { width: 50vw; }

    /* ── SVG overlay: lines + clickable regions ── */
    #overlay-svg {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      z-index: 10;
      overflow: visible;
    }

    /* clickable regions — transparent until hover */
    .body-region {
      fill: #ff0000;
      fill-opacity: 0;
      cursor: pointer;
      transition: fill-opacity 0.2s;
    }
    .body-region:hover { fill-opacity: 0; }
    .body-region.active { fill-opacity: 0; }
    body.panel-open .body-region { pointer-events: none; }

    /* connector line */
    .connector-line { display: none; }

    /* ── left column ── */
    .left-col {
      position: fixed;
      left: 0; top: 0; bottom: 0;
      width: 190px;
      z-index: 30;
      display: flex;
      flex-direction: column;
      padding: 28px 20px 24px;
    }
    .col-title {
      font-family: 'Fragment Mono', monospace;
      font-size: 1.5rem;
      font-weight: 400;
      letter-spacing: 0.08em;
      color: #1a1a1a;
      margin-bottom: 3px;
    }
    .col-subtitle {
      font-family: 'Cormorant', serif;
      font-size: 1.05rem;
      font-weight: 300;
      font-style: italic;
      color: rgba(0,0,0,0.35);
      margin-bottom: 28px;
    }
    .col-section {
      font-family: 'Fragment Mono', monospace;
      font-size: 0.56rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(0,0,0,0.28);
      margin-bottom: 8px;
    }
    .zone-list { list-style: none; }
    .zone-item {
      font-family: 'Fragment Mono', monospace;
      font-size: 0.70rem;
      letter-spacing: 0.05em;
      color: rgba(0,0,0,0.45);
      padding: 6px 0;
      border-bottom: 0.5px solid rgba(0,0,0,0.05);
      cursor: pointer;
      transition: color 0.15s;
      user-select: none;
    }
    .zone-item:first-child { border-top: 0.5px solid rgba(0,0,0,0.05); }
    .zone-item:hover { color: #000; }
    .zone-item.active { color: #ff0000; }
    .col-back {
      font-family: 'Fragment Mono', monospace;
      font-size: 0.56rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(0,0,0,0.22);
      text-decoration: none;
      margin-top: auto;
      padding-top: 20px;
      transition: color 0.2s;
    }
    .col-back:hover { color: rgba(0,0,0,0.55); }

    /* ── card — right anchored, original style ── */
    .card {
      position: fixed;
      left: 55%;
      width: 210px;
      background: #f5f2eb;
      border: 1px solid rgba(255,0,0,0.15);
      padding: 16px 18px 12px;
      z-index: 100;
      pointer-events: none;
      opacity: 0;
      transform: translateX(8px);
      transition: opacity 0.2s ease, transform 0.2s ease;
    }
    .card.visible {
      opacity: 1;
      transform: translateX(0);
      pointer-events: all;
    }
    body.panel-open .card { opacity: 0; pointer-events: none; }

    .card-label {
      font-family: 'Fragment Mono', monospace;
      font-size: 0.60rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #ff0000;
      opacity: 0.6;
      margin-bottom: 5px;
    }
    .card-title {
      font-family: 'Cormorant', serif;
      font-size: 1.55rem;
      font-weight: 300;
      font-style: italic;
      color: #0a0a0a;
      margin-bottom: 12px;
      line-height: 1.15;
    }
    .card-topic-list { list-style: none; }
    .card-topic-item {
      display: flex;
      align-items: center;
      gap: 7px;
      font-family: 'Fragment Mono', monospace;
      font-size: 0.64rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: rgba(0,0,0,0.6);
      padding: 6px 0;
      border-top: 0.5px solid rgba(0,0,0,0.07);
      cursor: pointer;
      transition: color 0.15s, padding-left 0.15s;
    }
    .card-topic-item:last-child { border-bottom: 0.5px solid rgba(0,0,0,0.07); }
    .card-topic-item::before { content: '→'; opacity: 0.35; font-size: 1.5rem; flex-shrink: 0; }
    .card-topic-item:hover { color: #ff0000; padding-left: 5px; }

    /* ── right panel ── */
    .info-panel {
      position: fixed;
      top: 0; right: 0;
      width: 50vw;
      height: 100vh;
      z-index: 40;
      transform: translateX(100%);
      transition: transform 0.4s ease;
      display: flex;
    }
    .info-panel.open { transform: translateX(0); }

    .panel-topics {
      width: 210px;
      flex-shrink: 0;
      padding: 32px 0 32px 28px;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }
    .panel-topics::-webkit-scrollbar { width: 0; }

    .panel-zone-label {
      font-family: 'Fragment Mono', monospace;
      font-size: 0.56rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #ff0000;
      opacity: 0.6;
      margin-bottom: 4px;

    }
    .panel-zone-title {
      font-family: 'Cormorant', serif;

      font-weight: 300;
      font-style: italic;
      color: #0a0a0a;
      margin-bottom: 16px;
      display: block;
      line-height: 1.2;
      border-bottom: 0.5px solid rgba(0,0,0,0.08);
      padding-bottom: 14px;
    }
    .panel-body-nav { list-style: none; margin-bottom: 14px; }
    .panel-body-nav-item {
      font-family: 'Fragment Mono', monospace;
      font-size: 0.4rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: rgba(0,0,0,0.28);
      padding: 3px 0;
      cursor: pointer;
      transition: color 0.15s;
    }
    .panel-body-nav-item:hover { color: #000; }
    .panel-body-nav-item.active { color: #ff0000; }
    .panel-nav-divider {
      border: none;
      border-top: 0.5px solid rgba(0,0,0,0.07);
      margin-bottom: 12px;
    }
    .panel-topic-list { list-style: none; flex: 1; }
    .panel-topic-item {
      font-family: 'Fragment Mono', monospace;
      font-size: 0.62rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: rgba(0,0,0,0.4);
      padding: 7px 0;
      cursor: pointer;
      border-bottom: 0.5px solid rgba(0,0,0,0.05);
      transition: color 0.15s, padding-left 0.15s;
    }
    .panel-topic-item:hover { color: #000; padding-left: 5px; }
    .panel-topic-item.active { color: #ff0000; padding-left: 5px; }
    .panel-close-btn {
      display: block;
      margin-top: 24px;
      font-family: 'Fragment Mono', monospace;
      font-size: 0.56rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(0,0,0,0.22);
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      transition: color 0.2s;
      text-align: left;
    }
    .panel-close-btn:hover { color: #000; }

    .panel-content {
      flex: 1;
      overflow-y: auto;
      padding: 32px 28px 60px 20px;
    }
    .panel-content::-webkit-scrollbar { width: 0; }

    .content-title {
      font-family: 'Cormorant', serif;
      font-size: 2.4rem;
      font-weight: 300;
      font-style: italic;
      color: #0a0a0a;
      line-height: 1.1;
      margin-bottom: 4px;
    }
    .content-label {
      font-family: 'Fragment Mono', monospace;
      font-size: 0.56rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(0,0,0,0.22);
      margin-bottom: 28px;
      display: block;
    }
    .content-section { margin-bottom: 26px; }
    .content-section-label {
      font-family: 'Fragment Mono', monospace;
      font-size: 0.56rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #ff0000;
      opacity: 0.5;
      display: block;
      margin-bottom: 8px;
    }
    .content-text {
      font-family: 'Cormorant Garamond', serif;

      font-weight: 300;
    }
    .content-divider {
      border: none;
      border-top: 0.5px solid rgba(0,0,0,0.07);
      margin: 22px 0;
    }
    .content-links { list-style: none; }
    .content-links li { border-top: 0.5px solid rgba(0,0,0,0.06); }
    .content-links li:last-child { border-bottom: 0.5px solid rgba(0,0,0,0.06); }
    .content-links a {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 9px 0;
      font-family: 'Fragment Mono', monospace;
      font-size: 0.60rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: rgba(0,0,0,0.42);
      text-decoration: none;
      transition: color 0.15s, padding-left 0.15s;

    .content-links a:hover { color: #ff0000; padding-left: 5px; }
    .content-links a::after { content: '↗'; opacity: 0.35; }
    .content-placeholder {

      line-height: 1.85;

    /* ── inline symptom search ── */
    .col-search { margin-bottom: 4px; }
    .col-search-row {

      margin-bottom: 10px;
    }

      flex: 1;
      background: transparent;
      border: none;
      font-family: 'Fragment Mono', monospace;

      font-size: 1.5rem;

    /* result items in left col */
    .col-result-item {
      font-family: 'Fragment Mono', monospace;
      font-size: 0.60rem;

      color: rgba(0,0,0,0.45);
      padding: 5px 0;
      border-bottom: 0.5px solid rgba(0,0,0,0.05);
      cursor: pointer;
      transition: color 0.15s, padding-left 0.15s;
      line-height: 1.5;
    }
    .col-result-item:first-child { border-top: 0.5px solid rgba(0,0,0,0.05); }

    .col-result-zone {
      font-size: 0.34rem;
      color: #ff0000;
      opacity: 0.55;

      margin-bottom: 1px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    .col-no-results {
      font-family: 'Fragment Mono', monospace;
      font-size: 0.56rem;
      color: rgba(0,0,0,0.28);
      padding: 6px 0;
      line-height: 1.6;

    .floating-br {
      position: fixed;
      right: 28px;
      bottom: 24px;
      font-family: 'Fragment Mono', monospace;
      font-size: 0.56rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(0,0,0,0.18);
      z-index: 30;
    }
    .floating-tr {
      position: fixed;
      right: 28px;
      top: 24px;
      font-family: 'Cormorant', serif;
      font-size: 1.4rem;
      font-weight: 300;
      font-style: italic;
      color: rgba(0,0,0,0.22);
      z-index: 30;
      transition: opacity 0.3s;
    }
    body.panel-open .floating-tr { opacity: 0; pointer-events: none; }
  </style>
</head>

    <!-- clickable body regions -->
    <ellipse class="body-region" data-zone="scalp"  cx="960" cy="112"  rx="115" ry="100"/>

    <ellipse class="body-region" data-zone="neck"   cx="962" cy="368"  rx="58"  ry="58"/>

  <div class="card" id="card">

  <!-- panel -->

      <span class="panel-zone-label" id="panel-zone-label"></span>

  <div class="floating-tr">click any zone to explore</div>

<script>
const zones = {
  scalp: { label:'01 — scalp', title:'Scalp & Hair', topics:[
    { name:'Trichology research', slug:'trichology', notes:'Your trichology research notes go here. Add what you\'ve learned about scalp health, hair loss, hair growth cycles, and what you\'ve discussed with specialists.', links:[{text:'Trichological Society',href:'https://www.trichological.com'}]},
    { name:'Scalp photos & progress', slug:'photos', notes:'Document your scalp health over time. Add before/after photos, progress notes, and observations about changes in density, texture, and scalp condition.', links:[]},

    { name:'Products', slug:'products', notes:'A running list of products you\'ve tried, what you\'re currently using, and what to avoid. Rate them, note ingredients to watch for.', links:[{text:'Ingredient checker',href:'https://www.cosdna.com'}]},

  face: { label:'02 — face', title:'Face & Skin', topics:[
    { name:'AM routine', slug:'am', notes:'Your morning skincare routine — every step, product, and why it\'s there.', links:[]},
    { name:'PM routine', slug:'pm', notes:'Evening routine — cleansing, treatments, actives, and overnight products.', links:[]},
    { name:'Active ingredients', slug:'actives', notes:'Deep dive into the actives you use or are researching — retinoids, acids, vitamin C, niacinamide.', links:[{text:'INCIDecoder',href:'https://incidecoder.com'}]},
    { name:'SPF research', slug:'spf', notes:'SPF research, what you\'ve tested, and what works for your skin tone.', links:[]},
    { name:'Hyperpigmentation', slug:'pigmentation', notes:'Research and personal notes on treating hyperpigmentation — what\'s worked, what hasn\'t.', links:[]},
  ]},
  neck: { label:'03 — neck', title:'Neck & Posture', topics:[
    { name:'Posture research', slug:'posture', notes:'Posture research, assessments, and personal notes.', links:[]},
    { name:'Neck skincare', slug:'skincare', notes:'Notes on extending your skincare routine downward, specific products, and any concerns.', links:[]},
    { name:'Stretching routine', slug:'stretch', notes:'Neck and upper back stretching routine — what you do, how often, and how it helps.', links:[]},
  ]},
  torso: { label:'04 — gut', title:'Gut & Digestion', topics:[
    { name:'Microbiome research', slug:'microbiome', notes:'Research on gut microbiome health — diversity, prebiotics vs probiotics.', links:[{text:'Zoe Science & Nutrition',href:'https://joinzoe.com'}]},
    { name:'Food sensitivities', slug:'sensitivities', notes:'Personal food sensitivity notes — what you\'ve tested, eliminated, reintroduced.', links:[]},
    { name:'Supplement stack', slug:'supplements', notes:'Current supplements, why you take them, dosages, and observations.', links:[]},
    { name:'Nutrition protocols', slug:'nutrition', notes:'Eating protocols you\'ve researched or tried.', links:[]},
    { name:'Probiotics & enzymes', slug:'probiotics', notes:'Probiotic strains researched, digestive enzymes tried, and your observations.', links:[]},
  ]},
  arms: { label:'05 — arms', title:'Arms & Hands', topics:[
    { name:'Hand & nail care', slug:'nails', notes:'Nail health research, cuticle care, products used, and any issues like peeling or breakage.', links:[]},
    { name:'Strength training', slug:'training', notes:'Upper body and arm training notes — exercises, progression, and observations.', links:[]},
    { name:'Skin texture research', slug:'skin', notes:'Notes on keratosis pilaris, dry skin, body acne, or other texture concerns on arms.', links:[]},
  ]},
  legs: { label:'06 — legs', title:'Legs & Feet', topics:[
    { name:'Mobility & stretching', slug:'mobility', notes:'Lower body mobility research — hip flexors, hamstrings, glutes.', links:[]},
    { name:'Foot care routine', slug:'feet', notes:'Foot care — exfoliation, moisturising, nail care, and any issues like calluses or dryness.', links:[]},
    { name:'Workout & recovery', slug:'workout', notes:'Leg day workouts, recovery protocols, and notes on soreness and progression.', links:[]},
    { name:'Vascular health', slug:'vascular', notes:'Research on vascular health — circulation, spider veins, and how movement affects your legs.', links:[]},
  ]},
};

const zoneOrder = ['scalp','face','neck','torso','arms','legs'];

// center points of each region in viewBox coordinates (1920x1080)
const regionCenters = {
  scalp: { vx: 960,  vy: 112  },
  face:  { vx: 968,  vy: 248  },
  neck:  { vx: 962,  vy: 368  },
  torso: { vx: 942,  vy: 545  },
  arms:  { vx: 1130, vy: 480  },
  legs:  { vx: 942,  vy: 840  },
};

const card           = document.getElementById('card');
const connectorLine  = document.getElementById('connector-line');
const infoPanel      = document.getElementById('info-panel');
const panelZoneLabel = document.getElementById('panel-zone-label');
const panelZoneTitle = document.getElementById('panel-zone-title');
const panelBodyNav   = document.getElementById('panel-body-nav');
const panelTopicList = document.getElementById('panel-topic-list');
const panelContent   = document.getElementById('panel-content');
let activeZone = null;

/* convert viewBox coords to screen coords accounting for preserveAspectRatio slice */
function vbToScreen(vx, vy) {
  const W = window.innerWidth, H = window.innerHeight;
  const vbW = 1920, vbH = 1080;
  const scale  = Math.max(W / vbW, H / vbH);
  const offsetX = (W - vbW * scale) / 2;
  const offsetY = (H - vbH * scale) / 2;
  return { x: offsetX + vx * scale, y: offsetY + vy * scale };
}

/* show card + no line */
function showCard(zone) {
  const z = zones[zone];
  document.getElementById('card-label').textContent = z.label;
  document.getElementById('card-title').textContent = z.title;
  document.getElementById('card-topic-list').innerHTML = z.topics.map(t =>
    `<li class="card-topic-item" data-zone="${zone}" data-slug="${t.slug}">${t.name}</li>`
  ).join('');

  document.querySelectorAll('.card-topic-item').forEach(item => {
    item.addEventListener('click', e => {
      e.stopPropagation();
      openPanel(item.dataset.zone, item.dataset.slug);
    });
  });

  // get region center in screen coords for vertical alignment
  const c  = regionCenters[zone];
  const sc = vbToScreen(c.vx, c.vy);

  card.style.visibility = 'hidden';
  card.style.display = 'block';
  const cH = card.offsetHeight;
  card.style.visibility = '';
  card.style.display = '';

  let cardTop = sc.y - cH / 2;
  cardTop = Math.max(16, Math.min(cardTop, window.innerHeight - cH - 16));
  card.style.top = cardTop + 'px';

  card.classList.add('visible');
}

function clearCard() {
  card.classList.remove('visible');
  document.querySelectorAll('.body-region').forEach(r => r.classList.remove('active'));
}

/* open full panel */
function openPanel(zone, slug) {
  activeZone = zone;
  const z = zones[zone];

  panelZoneLabel.textContent = z.label;
  panelZoneTitle.textContent = z.title;

  panelBodyNav.innerHTML = zoneOrder.map(zk =>
    `<li class="panel-body-nav-item${zk === zone ? ' active' : ''}" data-zone="${zk}">${zones[zk].title}</li>`
  ).join('');
  panelBodyNav.querySelectorAll('.panel-body-nav-item').forEach(item =>
    item.addEventListener('click', () => switchZone(item.dataset.zone)));

  buildTopicList(zone, slug || z.topics[0].slug);
  loadTopic(zone, slug || z.topics[0].slug);

  infoPanel.classList.add('open');
  document.body.classList.add('panel-open');
}

function switchZone(zone) {
  activeZone = zone;
  const z = zones[zone];
  panelZoneLabel.textContent = z.label;
  panelZoneTitle.textContent = z.title;
  panelBodyNav.querySelectorAll('.panel-body-nav-item').forEach(item =>
    item.classList.toggle('active', item.dataset.zone === zone));
  document.querySelectorAll('.zone-item').forEach(l => l.classList.remove('active'));
  document.querySelector(`.zone-item[data-zone="${zone}"]`)?.classList.add('active');
  buildTopicList(zone, z.topics[0].slug);
  loadTopic(zone, z.topics[0].slug);
}

function buildTopicList(zone, activeSlug) {
  panelTopicList.innerHTML = zones[zone].topics.map(t =>
    `<li class="panel-topic-item${t.slug === activeSlug ? ' active' : ''}" data-zone="${zone}" data-slug="${t.slug}">${t.name}</li>`
  ).join('');
  panelTopicList.querySelectorAll('.panel-topic-item').forEach(item =>
    item.addEventListener('click', () => loadTopic(item.dataset.zone, item.dataset.slug)));
}

function loadTopic(zone, slug) {
  const z     = zones[zone];
  const topic = z.topics.find(t => t.slug === slug);
  if (!topic) return;
  panelTopicList.querySelectorAll('.panel-topic-item').forEach(item =>
    item.classList.toggle('active', item.dataset.slug === slug));
  const linksHTML = topic.links.length > 0
    ? `<ul class="content-links">${topic.links.map(l =>
        `<li><a href="${l.href}" target="_blank" rel="noopener">${l.text}</a></li>`).join('')}</ul>`
    : '';
  panelContent.innerHTML = `
    <div class="content-title">${topic.name}</div>
    <span class="content-label">${z.label}</span>
    <div class="content-section">
      <span class="content-section-label">Notes</span>
      <p class="content-text">${topic.notes}</p>
    </div>
    ${topic.links.length > 0 ? `<hr class="content-divider"/>
      <div class="content-section">
        <span class="content-section-label">Links &amp; resources</span>${linksHTML}
      </div>` : ''}
    <hr class="content-divider"/>
    <div class="content-section">
      <span class="content-section-label">Your content</span>
      <p class="content-placeholder">Photos, videos, product lists, journal entries, and links will live here as you build out this section.</p>
    </div>`;
  panelContent.scrollTop = 0;
}

function clearAll() {
  clearCard();
  infoPanel.classList.remove('open');
  document.body.classList.remove('panel-open');
  document.querySelectorAll('.zone-item').forEach(l => l.classList.remove('active'));
  activeZone = null;
}

/* ── select zone (from region click or left col click) ── */
function selectZone(zone) {
  if (document.body.classList.contains('panel-open')) { switchZone(zone); return; }
  if (activeZone === zone) { clearAll(); return; }
  activeZone = zone;
  document.querySelectorAll('.zone-item').forEach(l => l.classList.remove('active'));
  document.querySelector(`.zone-item[data-zone="${zone}"]`)?.classList.add('active');
  document.querySelectorAll('.body-region').forEach(r => r.classList.remove('active'));
  document.querySelector(`.body-region[data-zone="${zone}"]`)?.classList.add('active');
  showCard(zone);
}

/* ── events ── */
document.querySelectorAll('.body-region').forEach(region => {
  region.addEventListener('click', e => { e.stopPropagation(); selectZone(region.dataset.zone); });
});

document.querySelectorAll('.zone-item').forEach(item => {
  item.addEventListener('click', e => { e.stopPropagation(); selectZone(item.dataset.zone); });
});

document.getElementById('panel-close-btn').addEventListener('click', clearAll);

document.addEventListener('click', e => {
  if (!e.target.closest('.left-col') && !e.target.closest('.card') &&
      !e.target.closest('.info-panel') && !e.target.closest('.body-region')) {
    clearAll();
  }
});

card.addEventListener('click', e => e.stopPropagation());
window.addEventListener('resize', () => { if (activeZone && !document.body.classList.contains('panel-open')) showCard(activeZone); });

symptomInput.addEventListener('keydown', e => { if (e.key === 'Enter') runSearch(); });
symptomSubmit.addEventListener('click', runSearch);

function runSearch() {
  const query = symptomInput.value.trim().toLowerCase();
  if (!query) { symptomResults.innerHTML = ''; return; }

  const matched = new Map();
  Object.entries(symptomMap).forEach(([keyword, results]) => {
    if (query.includes(keyword) || keyword.includes(query) ||
        keyword.split(' ').some(w => query.includes(w) && w.length > 3)) {
      results.forEach(([path, reason]) => {
        if (!matched.has(path)) {
          const [zoneKey, slug] = path.split('/');
          const zone  = zones[zoneKey];
          const topic = zone?.topics.find(t => t.slug === slug);
          if (zone && topic) matched.set(path, { zoneKey, zone, topic, reason });
        }
      });
    }
  });

  if (!matched.size) {
    symptomResults.innerHTML = '<div class="col-no-results">no results — try different terms</div>';
    return;
  }

  symptomResults.innerHTML = '';
  matched.forEach(({ zoneKey, zone, topic, reason }) => {
    const el = document.createElement('div');
    el.className = 'col-result-item';
    el.innerHTML = '<span class="col-result-zone">' + zone.title + '</span>' + topic.name;
    el.title = reason;
    el.addEventListener('click', () => {
      clearAll();
      symptomInput.value = '';
      symptomResults.innerHTML = '';
      setTimeout(() => {
        selectZone(zoneKey);
        setTimeout(() => openPanel(zoneKey, topic.slug), 300);
      }, 100);
    });
    symptomResults.appendChild(el);
  });
}
</script>
