<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Body Map — becs designed</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,300;0,400;1,300;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Fragment+Mono:ital@0;1&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; background: #f0efeb; }

    .photo {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      object-position: center center;
      display: block;
      z-index: 0;
      transition: width 0.45s ease;
    }
    body.panel-open .photo { width: 50vw; }

    /* ── SVG line layer ── */
    #line-svg {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      z-index: 10;
      pointer-events: none;
    }
    .connector-line {
      stroke: rgba(255,0,0,0.3);
      stroke-width: 1.5;
      fill: none;
      opacity: 0;
      transition: opacity 0.25s ease;
    }
    .connector-line.visible { opacity: 1; }
    body.panel-open .connector-line { opacity: 0; }

    /* ── left column ── */
    .left-col {
      position: fixed;
      left: 0;
      top: 0;
      bottom: 0;
      width: 160px;
      z-index: 30;
      display: flex;
      flex-direction: column;
      padding: 28px 20px 24px;
    }
    .col-title {
      font-family: 'Fragment Mono', monospace;
      font-size: 0.7rem;
      font-weight: 400;
      letter-spacing: 0.08em;
      color: #1a1a1a;
      margin-bottom: 3px;
    }
    .col-subtitle {
      font-family: 'Cormorant', serif;
      font-size: 0.78rem;
      font-weight: 300;
      font-style: italic;
      color: rgba(0,0,0,0.35);
      margin-bottom: 28px;
    }
    .col-section {
      font-family: 'Fragment Mono', monospace;
      font-size: 0.38rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: rgba(0,0,0,0.28);
      margin-bottom: 8px;
    }
    .zone-list { list-style: none; flex: 1; }
    .zone-item {
      font-family: 'Fragment Mono', monospace;
      font-size: 0.48rem;
      letter-spacing: 0.05em;
      color: rgba(0,0,0,0.45);
      padding: 6px 0;
      border-bottom: 0.5px solid rgba(0,0,0,0.05);
      cursor: pointer;
      transition: color 0.15s;
      user-select: none;
    }
    .zone-item:first-child { border-top: 0.5px solid rgba(0,0,0,0.05); }
    .zone-item:hover { color: #000; }
    .zone-item.active { color: #ff0000; }
    .col-back {
      font-family: 'Fragment Mono', monospace;
      font-size: 0.38rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(0,0,0,0.22);
      text-decoration: none;
      margin-top: auto;
      padding-top: 20px;
      transition: color 0.2s;
    }
    .col-back:hover { color: rgba(0,0,0,0.55); }

    /* ── hotspots (invisible) ── */
    .hotspot {
      position: fixed;
      width: 40px;
      height: 40px;
      transform: translate(-50%, -50%);
      cursor: crosshair;
      z-index: 20;
    }

    /* ── card — right anchored, transparent ── */
    .card {
      position: fixed;
      right: 40px;
      width: 220px;
      z-index: 100;
      pointer-events: none;
      opacity: 0;
      transform: translateX(6px);
      transition: opacity 0.2s ease, transform 0.2s ease;
      cursor: pointer;
    }
    .card.visible {
      opacity: 1;
      transform: translateX(0);
      pointer-events: all;
    }
    body.panel-open .card { opacity: 0; pointer-events: none; }

    .card-label {
      font-family: 'Fragment Mono', monospace;
      font-size: 0.38rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #ff0000;
      opacity: 0.7;
      margin-bottom: 3px;
    }
    .card-title {
      font-family: 'Cormorant', serif;
      font-size: 1.3rem;
      font-weight: 300;
      font-style: italic;
      color: #0a0a0a;
      margin-bottom: 8px;
      line-height: 1.1;
    }
    .card-topics-preview {
      list-style: none;
      margin-bottom: 10px;
    }
    .card-topics-preview li {
      font-family: 'Fragment Mono', monospace;
      font-size: 0.42rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: rgba(0,0,0,0.45);
      padding: 4px 0;
      border-top: 0.5px solid rgba(0,0,0,0.07);
    }
    .card-topics-preview li:last-child { border-bottom: 0.5px solid rgba(0,0,0,0.07); }
    .card-hint {
      font-family: 'Fragment Mono', monospace;
      font-size: 0.36rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(0,0,0,0.25);
      margin-top: 8px;
      transition: color 0.15s;
    }
    .card:hover .card-hint { color: #ff0000; }

    /* ── right panel ── */
    .info-panel {
      position: fixed;
      top: 0; right: 0;
      width: 50vw;
      height: 100vh;
      z-index: 40;
      transform: translateX(100%);
      transition: transform 0.4s ease;
      display: flex;
    }
    .info-panel.open { transform: translateX(0); }

    .panel-topics {
      width: 185px;
      flex-shrink: 0;
      padding: 32px 0 32px 28px;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }
    .panel-topics::-webkit-scrollbar { width: 0; }

    .panel-zone-label {
      font-family: 'Fragment Mono', monospace;
      font-size: 0.38rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #ff0000;
      opacity: 0.6;
      margin-bottom: 4px;
      display: block;
    }
    .panel-zone-title {
      font-family: 'Cormorant', serif;
      font-size: 1.2rem;
      font-weight: 300;
      font-style: italic;
      color: #0a0a0a;
      margin-bottom: 16px;
      display: block;
      line-height: 1.2;
      border-bottom: 0.5px solid rgba(0,0,0,0.08);
      padding-bottom: 14px;
    }

    /* body nav inside panel */
    .panel-body-nav { list-style: none; margin-bottom: 14px; }
    .panel-body-nav-item {
      font-family: 'Fragment Mono', monospace;
      font-size: 0.4rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: rgba(0,0,0,0.28);
      padding: 3px 0;
      cursor: pointer;
      transition: color 0.15s;
    }
    .panel-body-nav-item:hover { color: #000; }
    .panel-body-nav-item.active { color: #ff0000; }

    .panel-nav-divider {
      border: none;
      border-top: 0.5px solid rgba(0,0,0,0.07);
      margin-bottom: 12px;
    }

    .panel-topic-list { list-style: none; flex: 1; }
    .panel-topic-item {
      font-family: 'Fragment Mono', monospace;
      font-size: 0.44rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: rgba(0,0,0,0.4);
      padding: 7px 0;
      cursor: pointer;
      border-bottom: 0.5px solid rgba(0,0,0,0.05);
      transition: color 0.15s, padding-left 0.15s;
    }
    .panel-topic-item:hover { color: #000; padding-left: 5px; }
    .panel-topic-item.active { color: #ff0000; padding-left: 5px; }

    .panel-close-btn {
      display: block;
      margin-top: 24px;
      font-family: 'Fragment Mono', monospace;
      font-size: 0.38rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(0,0,0,0.22);
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      transition: color 0.2s;
      text-align: left;
    }
    .panel-close-btn:hover { color: #000; }

    .panel-content {
      flex: 1;
      overflow-y: auto;
      padding: 32px 28px 60px 20px;
    }
    .panel-content::-webkit-scrollbar { width: 0; }

    .content-title {
      font-family: 'Cormorant', serif;
      font-size: 1.8rem;
      font-weight: 300;
      font-style: italic;
      color: #0a0a0a;
      line-height: 1.1;
      margin-bottom: 4px;
    }
    .content-label {
      font-family: 'Fragment Mono', monospace;
      font-size: 0.38rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: rgba(0,0,0,0.22);
      margin-bottom: 28px;
      display: block;
    }
    .content-section { margin-bottom: 26px; }
    .content-section-label {
      font-family: 'Fragment Mono', monospace;
      font-size: 0.38rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #ff0000;
      opacity: 0.5;
      display: block;
      margin-bottom: 8px;
    }
    .content-text {
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.95rem;
      line-height: 1.85;
      color: rgba(0,0,0,0.58);
      font-weight: 300;
    }
    .content-divider {
      border: none;
      border-top: 0.5px solid rgba(0,0,0,0.07);
      margin: 22px 0;
    }
    .content-links { list-style: none; }
    .content-links li { border-top: 0.5px solid rgba(0,0,0,0.06); }
    .content-links li:last-child { border-bottom: 0.5px solid rgba(0,0,0,0.06); }
    .content-links a {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 9px 0;
      font-family: 'Fragment Mono', monospace;
      font-size: 0.42rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: rgba(0,0,0,0.42);
      text-decoration: none;
      transition: color 0.15s, padding-left 0.15s;
    }
    .content-links a:hover { color: #ff0000; padding-left: 5px; }
    .content-links a::after { content: '↗'; opacity: 0.35; }
    .content-placeholder {
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.9rem;
      line-height: 1.85;
      color: rgba(0,0,0,0.22);
      font-style: italic;
    }

    .floating-br {
      position: fixed;
      right: 28px;
      bottom: 24px;
      font-family: 'Fragment Mono', monospace;
      font-size: 0.38rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(0,0,0,0.18);
      z-index: 30;
    }
    .floating-tr {
      position: fixed;
      right: 28px;
      top: 24px;
      font-family: 'Cormorant', serif;
      font-size: 0.82rem;
      font-weight: 300;
      font-style: italic;
      color: rgba(0,0,0,0.22);
      z-index: 30;
      transition: opacity 0.3s;
    }
    body.panel-open .floating-tr { opacity: 0; pointer-events: none; }
  </style>
</head>
<body>

  <img class="photo" src="https://i.imgur.com/0VYkGrB.png" alt="body map"/>

  <svg id="line-svg" xmlns="http://www.w3.org/2000/svg">
    <line id="connector-line" class="connector-line" x1="0" y1="0" x2="0" y2="0"/>
  </svg>

  <div class="left-col">
    <div class="col-title">Body Map.</div>
    <div class="col-subtitle">a research index</div>
    <div class="col-section">Zones</div>
    <ul class="zone-list" id="zone-list">
      <li class="zone-item" data-zone="scalp">Scalp &amp; Hair</li>
      <li class="zone-item" data-zone="face">Face &amp; Skin</li>
      <li class="zone-item" data-zone="neck">Neck &amp; Posture</li>
      <li class="zone-item" data-zone="torso">Gut &amp; Digestion</li>
      <li class="zone-item" data-zone="arms">Arms &amp; Hands</li>
      <li class="zone-item" data-zone="legs">Legs &amp; Feet</li>
    </ul>
    <a class="col-back" href="https://becsdesigned.com">← becs designed</a>
  </div>

  <div class="hotspot" data-zone="scalp"></div>
  <div class="hotspot" data-zone="face"></div>
  <div class="hotspot" data-zone="neck"></div>
  <div class="hotspot" data-zone="torso"></div>
  <div class="hotspot" data-zone="arms"></div>
  <div class="hotspot" data-zone="legs"></div>

  <div class="card" id="card">
    <div class="card-label" id="card-label"></div>
    <div class="card-title" id="card-title"></div>
    <ul class="card-topics-preview" id="card-topics-preview"></ul>
    <div class="card-hint">click to explore →</div>
  </div>

  <div class="info-panel" id="info-panel">
    <div class="panel-topics">
      <span class="panel-zone-label" id="panel-zone-label"></span>
      <span class="panel-zone-title" id="panel-zone-title"></span>
      <ul class="panel-body-nav" id="panel-body-nav"></ul>
      <hr class="panel-nav-divider"/>
      <ul class="panel-topic-list" id="panel-topic-list"></ul>
      <button class="panel-close-btn" id="panel-close-btn">← close</button>
    </div>
    <div class="panel-content" id="panel-content"></div>
  </div>

  <div class="floating-tr">click any zone to explore</div>
  <div class="floating-br">broward, fl</div>

<script>
const zones = {
  scalp: { label:'01 — scalp', title:'Scalp & Hair', topics:[
    { name:'Trichology research', slug:'trichology', notes:'Your trichology research notes go here. Add what you\'ve learned about scalp health, hair loss, hair growth cycles, and what you\'ve discussed with specialists.', links:[{text:'Trichological Society',href:'https://www.trichological.com'},{text:'Scalp health journal',href:'#'}]},
    { name:'Scalp photos & progress', slug:'photos', notes:'Document your scalp health over time. Add before/after photos, progress notes, and observations about changes in density, texture, and scalp condition.', links:[]},
    { name:'Curly hair method', slug:'curly-method', notes:'Your curly hair method notes — what works, what doesn\'t, your curl pattern, porosity results, and the techniques that suit your hair best.', links:[{text:'Curly Girl Method',href:'https://www.naturallycurly.com'}]},
    { name:'Shampoo & co-wash', slug:'routine', notes:'Wash day routine, frequency, products used, and observations. Include your shampoo, conditioner, co-wash, and how your scalp responds.', links:[]},
    { name:'Porosity & moisture', slug:'moisture', notes:'Porosity test results, moisture-protein balance findings, and what your hair responds to. High, low, or medium porosity changes everything.', links:[]},
    { name:'Products', slug:'products', notes:'A running list of products you\'ve tried, what you\'re currently using, and what to avoid. Rate them, note ingredients to watch for.', links:[{text:'Ingredient checker',href:'https://www.cosdna.com'}]},
  ]},
  face: { label:'02 — face', title:'Face & Skin', topics:[
    { name:'AM routine', slug:'am', notes:'Your morning skincare routine — every step, product, and why it\'s there. Note actives, SPF, and anything you apply before makeup.', links:[]},
    { name:'PM routine', slug:'pm', notes:'Evening routine — cleansing, treatments, actives, and overnight products. Note the order of application and how your skin feels each morning.', links:[]},
    { name:'Active ingredients', slug:'actives', notes:'Deep dive into the actives you use or are researching — retinoids, acids, vitamin C, niacinamide. What they do, how to layer them, and what to avoid combining.', links:[{text:'INCIDecoder',href:'https://incidecoder.com'},{text:'Paula\'s Choice dictionary',href:'https://www.paulaschoice.com/ingredient-dictionary'}]},
    { name:'SPF research', slug:'spf', notes:'SPF research, what you\'ve tested, and what works for your skin tone. Notes on UVA/UVB protection and formulas that don\'t pill.', links:[]},
    { name:'Hyperpigmentation', slug:'pigmentation', notes:'Research and personal notes on treating hyperpigmentation — what\'s worked, what hasn\'t, and ingredients helpful for melanin-rich skin.', links:[]},
  ]},
  neck: { label:'03 — neck', title:'Neck & Posture', topics:[
    { name:'Posture research', slug:'posture', notes:'Posture research, assessments, and personal notes. What you\'ve noticed, exercises you\'ve tried, and how posture affects other areas of your health.', links:[]},
    { name:'Neck skincare', slug:'skincare', notes:'The neck is often neglected. Notes on extending your skincare routine downward, specific products, and any concerns like tech neck or texture.', links:[]},
    { name:'Stretching routine', slug:'stretch', notes:'Neck and upper back stretching routine — what you do, how often, and how it affects tension, headaches, and general comfort.', links:[]},
  ]},
  torso: { label:'04 — gut', title:'Gut & Digestion', topics:[
    { name:'Microbiome research', slug:'microbiome', notes:'Research on gut microbiome health — diversity, prebiotics vs probiotics, and what you\'ve learned about how your gut affects skin, mood, and immunity.', links:[{text:'Zoe Science & Nutrition',href:'https://joinzoe.com'}]},
    { name:'Food sensitivities', slug:'sensitivities', notes:'Personal food sensitivity notes — what you\'ve tested, eliminated, reintroduced, and how your body responded.', links:[]},
    { name:'Supplement stack', slug:'supplements', notes:'Current supplements, why you take them, dosages, and observations. Note any changes when you start or stop something.', links:[]},
    { name:'Nutrition protocols', slug:'nutrition', notes:'Eating protocols you\'ve researched or tried — anti-inflammatory, Mediterranean, intuitive eating, or other approaches.', links:[]},
    { name:'Probiotics & enzymes', slug:'probiotics', notes:'Probiotic strains researched, digestive enzymes tried, and your observations on how they affect digestion and gut comfort.', links:[]},
  ]},
  arms: { label:'05 — arms', title:'Arms & Hands', topics:[
    { name:'Hand & nail care', slug:'nails', notes:'Nail health research, cuticle care, products used, and any issues like peeling, breakage, or slow growth.', links:[]},
    { name:'Strength training', slug:'training', notes:'Upper body and arm training notes — exercises, progression, and how your arms feel and look with different training approaches.', links:[]},
    { name:'Skin texture research', slug:'skin', notes:'Notes on keratosis pilaris, dry skin, body acne, or other texture concerns on arms. What treatments you\'ve researched and tried.', links:[]},
  ]},
  legs: { label:'06 — legs', title:'Legs & Feet', topics:[
    { name:'Mobility & stretching', slug:'mobility', notes:'Lower body mobility research — hip flexors, hamstrings, glutes. Stretches and routines that\'ve helped with tightness, pain, or range of motion.', links:[]},
    { name:'Foot care routine', slug:'feet', notes:'Foot care — exfoliation, moisturising, nail care, and any issues like calluses, dryness, or ingrown nails.', links:[]},
    { name:'Workout & recovery', slug:'workout', notes:'Leg day workouts, recovery protocols, and notes on soreness, progression, and what your lower body responds to best.', links:[]},
    { name:'Vascular health', slug:'vascular', notes:'Research on vascular health — circulation, spider veins, varicose veins, and how movement, compression, and nutrition affect your legs.', links:[]},
  ]},
};

const zoneOrder = ['scalp','face','neck','torso','arms','legs'];

const hotspotPositions = {
  scalp: { x: 0.500, y: 0.10 },
  face:  { x: 0.508, y: 0.19 },
  neck:  { x: 0.503, y: 0.29 },
  torso: { x: 0.485, y: 0.48 },
  arms:  { x: 0.595, y: 0.38 },
  legs:  { x: 0.485, y: 0.78 },
};

const card           = document.getElementById('card');
const connectorLine  = document.getElementById('connector-line');
const infoPanel      = document.getElementById('info-panel');
const panelZoneLabel = document.getElementById('panel-zone-label');
const panelZoneTitle = document.getElementById('panel-zone-title');
const panelBodyNav   = document.getElementById('panel-body-nav');
const panelTopicList = document.getElementById('panel-topic-list');
const panelContent   = document.getElementById('panel-content');
let activeZone = null;

function repositionHotspots() {
  document.querySelectorAll('.hotspot').forEach(dot => {
    const p = hotspotPositions[dot.dataset.zone];
    dot.style.left = (p.x * window.innerWidth) + 'px';
    dot.style.top  = (p.y * window.innerHeight) + 'px';
  });
}
window.addEventListener('resize', () => { repositionHotspots(); if (activeZone) showCard(activeZone); });
repositionHotspots();

/* ── show card anchored to right, line from hotspot to card left edge ── */
function showCard(zone) {
  const z = zones[zone];
  document.getElementById('card-label').textContent = z.label;
  document.getElementById('card-title').textContent = z.title;
  document.getElementById('card-topics-preview').innerHTML = z.topics
    .map(t => `<li>${t.name}</li>`).join('');

  // measure card
  card.style.visibility = 'hidden';
  card.style.display = 'block';
  const cW = card.offsetWidth;
  const cH = card.offsetHeight;
  card.style.visibility = '';
  card.style.display = '';

  // hotspot position
  const p    = hotspotPositions[zone];
  const dotX = p.x * window.innerWidth;
  const dotY = p.y * window.innerHeight;

  // card vertically centered on hotspot, anchored right: 40px
  let cardTop = dotY - cH / 2;
  cardTop = Math.max(16, Math.min(cardTop, window.innerHeight - cH - 16));
  card.style.top = cardTop + 'px';

  // horizontal line from hotspot right → card left edge
  const cardLeft = window.innerWidth - 40 - cW;
  connectorLine.setAttribute('x1', dotX);
  connectorLine.setAttribute('y1', dotY);
  connectorLine.setAttribute('x2', cardLeft);
  connectorLine.setAttribute('y2', dotY); // same Y = perfectly horizontal
  connectorLine.classList.add('visible');

  card.classList.add('visible');
}

function clearCard() {
  card.classList.remove('visible');
  connectorLine.classList.remove('visible');
}

/* ── open panel ── */
function openPanel(zone) {
  activeZone = zone;
  const z = zones[zone];

  panelZoneLabel.textContent = z.label;
  panelZoneTitle.textContent = z.title;

  panelBodyNav.innerHTML = zoneOrder.map(zk =>
    `<li class="panel-body-nav-item${zk === zone ? ' active' : ''}" data-zone="${zk}">${zones[zk].title}</li>`
  ).join('');
  panelBodyNav.querySelectorAll('.panel-body-nav-item').forEach(item =>
    item.addEventListener('click', () => switchZone(item.dataset.zone)));

  buildTopicList(zone, z.topics[0].slug);
  loadTopic(zone, z.topics[0].slug);

  infoPanel.classList.add('open');
  document.body.classList.add('panel-open');
}

function switchZone(zone) {
  activeZone = zone;
  const z = zones[zone];
  panelZoneLabel.textContent = z.label;
  panelZoneTitle.textContent = z.title;

  panelBodyNav.querySelectorAll('.panel-body-nav-item').forEach(item =>
    item.classList.toggle('active', item.dataset.zone === zone));
  document.querySelectorAll('.zone-item').forEach(l => l.classList.remove('active'));
  document.querySelector(`.zone-item[data-zone="${zone}"]`)?.classList.add('active');

  buildTopicList(zone, z.topics[0].slug);
  loadTopic(zone, z.topics[0].slug);
}

function buildTopicList(zone, activeSlug) {
  panelTopicList.innerHTML = zones[zone].topics.map(t =>
    `<li class="panel-topic-item${t.slug === activeSlug ? ' active' : ''}" data-zone="${zone}" data-slug="${t.slug}">${t.name}</li>`
  ).join('');
  panelTopicList.querySelectorAll('.panel-topic-item').forEach(item =>
    item.addEventListener('click', () => loadTopic(item.dataset.zone, item.dataset.slug)));
}

function loadTopic(zone, slug) {
  const z     = zones[zone];
  const topic = z.topics.find(t => t.slug === slug);
  if (!topic) return;

  panelTopicList.querySelectorAll('.panel-topic-item').forEach(item =>
    item.classList.toggle('active', item.dataset.slug === slug));

  const linksHTML = topic.links.length > 0
    ? `<ul class="content-links">${topic.links.map(l =>
        `<li><a href="${l.href}" target="_blank" rel="noopener">${l.text}</a></li>`).join('')}</ul>`
    : '';

  panelContent.innerHTML = `
    <div class="content-title">${topic.name}</div>
    <span class="content-label">${z.label}</span>
    <div class="content-section">
      <span class="content-section-label">Notes</span>
      <p class="content-text">${topic.notes}</p>
    </div>
    ${topic.links.length > 0 ? `
      <hr class="content-divider"/>
      <div class="content-section">
        <span class="content-section-label">Links &amp; resources</span>${linksHTML}
      </div>` : ''}
    <hr class="content-divider"/>
    <div class="content-section">
      <span class="content-section-label">Your content</span>
      <p class="content-placeholder">Photos, videos, product lists, journal entries, and links will live here as you build out this section.</p>
    </div>`;
  panelContent.scrollTop = 0;
}

function clearAll() {
  clearCard();
  infoPanel.classList.remove('open');
  document.body.classList.remove('panel-open');
  document.querySelectorAll('.zone-item').forEach(l => l.classList.remove('active'));
  activeZone = null;
}

/* ── card click → panel ── */
card.addEventListener('click', e => {
  e.stopPropagation();
  if (activeZone) openPanel(activeZone);
});

/* ── zone item click ── */
document.querySelectorAll('.zone-item').forEach(item => {
  item.addEventListener('click', e => {
    e.stopPropagation();
    const zone = item.dataset.zone;
    if (document.body.classList.contains('panel-open')) { switchZone(zone); return; }
    if (activeZone === zone) { clearAll(); return; }
    activeZone = zone;
    document.querySelectorAll('.zone-item').forEach(l => l.classList.remove('active'));
    item.classList.add('active');
    showCard(zone);
  });
});

/* ── hotspot click ── */
document.querySelectorAll('.hotspot').forEach(dot => {
  dot.addEventListener('click', e => {
    e.stopPropagation();
    const zone = dot.dataset.zone;
    if (document.body.classList.contains('panel-open')) { switchZone(zone); return; }
    if (activeZone === zone) { clearAll(); return; }
    activeZone = zone;
    document.querySelectorAll('.zone-item').forEach(l => l.classList.remove('active'));
    document.querySelector(`.zone-item[data-zone="${zone}"]`)?.classList.add('active');
    showCard(zone);
  });
});

document.getElementById('panel-close-btn').addEventListener('click', clearAll);

document.addEventListener('click', e => {
  if (!e.target.closest('.left-col') && !e.target.closest('.card') &&
      !e.target.closest('.info-panel') && !e.target.closest('.hotspot')) {
    clearAll();
  }
});
</script>
</body>
</html>
